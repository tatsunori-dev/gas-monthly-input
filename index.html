<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月次入力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #5b8af0;
    --accent2: #7c6af5;
    --green: #34c77b;
    --red: #f05b5b;
    --yellow: #f0c05b;
    --text: #e2e6f3;
    --text2: #8892b0;
    --text3: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── ヘッダー ── */
  .app-header {
    background: linear-gradient(135deg, #1a1d27 0%, #141828 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .app-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .04em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .user-badge {
    display: flex; align-items: center; gap: 10px;
    font-size: .82rem; color: var(--text2);
  }
  .btn-logout {
    background: none; border: 1px solid var(--border);
    color: var(--text2); padding: 4px 12px; border-radius: 6px;
    cursor: pointer; font-size: .78rem; transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── タブ ── */
  .tab-bar {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    background: var(--surface);
    overflow-x: auto;
  }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); padding: 12px 18px; cursor: pointer;
    font-size: .88rem; font-family: var(--sans); white-space: nowrap;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── コンテンツ ── */
  .tab-panel { display: none; padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .tab-panel.active { display: block; }

  /* ── カード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: .78rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
  }

  /* ── フォーム ── */
  label { font-size: .82rem; color: var(--text2); display: block; margin-bottom: 5px; }
  input[type=text], input[type=password], input[type=date], textarea, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 7px; padding: 9px 12px;
    font-family: var(--sans); font-size: .92rem;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=password]:focus,
  input[type=date]:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 70px; }
  select { cursor: pointer; }
  select option { background: var(--surface); }

  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width: 560px) { .row-3, .row-2 { grid-template-columns: 1fr; } }
  .form-group { margin-bottom: 14px; }

  /* ── 取引先ピル ── */
  .pills-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .pill {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 5px 13px; border-radius: 20px;
    cursor: pointer; font-size: .83rem; font-family: var(--sans);
    transition: all .18s; white-space: nowrap; user-select: none;
  }
  .pill.selected {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 600;
  }
  .pill:hover:not(.selected) { border-color: var(--accent); color: var(--text); }

  /* ── 合計売上 ── */
  .total-sales-box {
    background: linear-gradient(135deg, #1e2540, #1a1d27);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    margin: 14px 0;
    display: flex; align-items: baseline; gap: 10px;
  }
  .total-sales-label { font-size: .78rem; color: var(--text2); }
  .total-sales-num {
    font-family: var(--mono); font-size: 1.5rem; font-weight: 600;
    color: var(--green);
  }
  .client-breakdown {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
  }
  .breakdown-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    font-size: .8rem; font-family: var(--mono);
    color: var(--text2);
  }
  .breakdown-item span { color: var(--text); font-weight: 600; }

  /* ── ボタン ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 22px; border-radius: 8px; border: none;
    cursor: pointer; font-family: var(--sans); font-size: .9rem;
    font-weight: 600; transition: all .2s; text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-secondary {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
  .btn-sm { padding: 6px 14px; font-size: .82rem; }

  /* ── アラート ── */
  .alert {
    padding: 10px 14px; border-radius: 8px; font-size: .88rem;
    margin-bottom: 12px; display: flex; align-items: flex-start; gap: 8px;
  }
  .alert-warn { background: rgba(240,192,91,.12); border: 1px solid rgba(240,192,91,.35); color: var(--yellow); }
  .alert-success { background: rgba(52,199,123,.12); border: 1px solid rgba(52,199,123,.35); color: var(--green); }
  .alert-error { background: rgba(240,91,91,.12); border: 1px solid rgba(240,91,91,.35); color: var(--red); }
  .alert-info { background: rgba(91,138,240,.1); border: 1px solid rgba(91,138,240,.3); color: var(--accent); }

  /* ── テーブル ── */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  th {
    background: var(--surface2); padding: 9px 10px;
    text-align: left; color: var(--text2); font-weight: 600;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(91,138,240,.05); }
  .cb-cell { text-align: center; width: 36px; }
  input[type=checkbox] {
    width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
  }

  /* ── セレクトボックス ── */
  .inline-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }

  /* ── レポート ── */
  .report-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px;
    font-family: var(--mono); font-size: .83rem;
    white-space: pre-wrap; line-height: 1.6;
    color: var(--text2); max-height: 600px; overflow-y: auto;
  }
  .pace-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 9px; font-size: .9rem;
    margin-bottom: 14px; font-weight: 600;
  }
  .pace-ok  { background: rgba(52,199,123,.15); border: 1px solid rgba(52,199,123,.4); color: var(--green); }
  .pace-ng  { background: rgba(240,91,91,.12);  border: 1px solid rgba(240,91,91,.4);  color: var(--red); }

  /* ── ローディング ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; backdrop-filter: blur(3px);
  }
  .loading-overlay .box {
    background: var(--surface); border: 1px solid var(--border);
    padding: 24px 32px; border-radius: 12px;
    display: flex; align-items: center; gap: 14px;
    font-size: .95rem; color: var(--text2);
  }

  /* ── ログイン ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #1a2040 0%, var(--bg) 70%);
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 380px;
    box-shadow: var(--shadow);
  }
  .login-title {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-subtitle { font-size: .83rem; color: var(--text3); margin-bottom: 26px; }

  /* ── CSV インポート ── */
  .file-drop {
    border: 2px dashed var(--border); border-radius: 9px;
    padding: 28px; text-align: center; cursor: pointer;
    transition: border-color .2s; color: var(--text2); font-size: .88rem;
  }
  .file-drop:hover, .file-drop.drag { border-color: var(--accent); color: var(--accent); }

  /* ── 月セレクタ ── */
  .month-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ── dirty バッジ ── */
  .dirty-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--yellow); border-radius: 50%; margin-left: 4px;
    animation: pulse .9s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { opacity:.4; } to { opacity:1; } }

  /* ── スクロールバー ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     ログイン画面
════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">月次入力</div>
    <div class="login-subtitle">ログインして続行</div>
    <div class="form-group">
      <label>ユーザー名</label>
      <input type="text" id="login-user" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pass" autocomplete="current-password" />
    </div>
    <div id="login-err" class="alert alert-error" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     メイン画面
════════════════════════════════════════════ -->
<div id="main-screen" style="display:none">
  <header class="app-header">
    <div class="app-title">📊 月次入力</div>
    <div class="user-badge">
      <span id="header-user"></span>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('input')">📝 入力</button>
    <button class="tab-btn" onclick="switchTab('data')">📋 データ</button>
    <button class="tab-btn" onclick="switchTab('import')">📥 インポート</button>
    <button class="tab-btn" onclick="switchTab('report')">📈 レポート</button>
  </nav>

  <!-- ── 入力タブ ── -->
  <div id="tab-input" class="tab-panel active">

    <div class="card">
      <div class="card-title">日付 / 時間入力</div>
      <p style="font-size:.78rem;color:var(--text3);margin-bottom:14px">同日なら上書き保存</p>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="date-input" onchange="onDateChange()" />
      </div>
      <div class="row-3">
        <div class="form-group">
          <label>合計 h（例 6.5）</label>
          <input type="text" id="total-h" placeholder="6.5" oninput="onAnyInput()" />
        </div>
        <div class="form-group">
          <label>frex h（例 2）</label>
          <input type="text" id="frex-h" placeholder="2" oninput="onAnyInput()" />
        </div>
        <div class="form-group">
          <label>fresh h（例 1.5）</label>
          <input type="text" id="fresh-h" placeholder="1.5" oninput="onAnyInput()" />
        </div>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="memo" oninput="onAnyInput()"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">取引先入力</div>
      <div id="pills-row1" class="pills-row"></div>
      <div id="pills-row2" class="pills-row"></div>
      <div class="form-group" style="margin-top:12px">
        <label>金額（円）— 選択中: <span id="sel-client-label" style="color:var(--accent);font-weight:600"></span></label>
        <input type="text" id="client-amount" placeholder="例: 12000"
               oninput="onClientAmountInput()" />
      </div>

      <div class="total-sales-box">
        <span class="total-sales-label">合計売上（自動）</span>
        <span class="total-sales-num" id="total-sales-num">0</span>
        <span style="font-size:.8rem;color:var(--text2)">円</span>
      </div>
      <div id="client-breakdown" class="client-breakdown"></div>
    </div>

    <div id="dirty-alert" class="alert alert-warn" style="display:none">
      ⚠ 未保存の変更があります。保存を押してね。
    </div>
    <div id="save-result"></div>
    <button class="btn btn-primary" onclick="saveRow()">
      💾 保存（同日なら上書き）
    </button>
  </div>

  <!-- ── データタブ ── -->
  <div id="tab-data" class="tab-panel">
    <div class="card">
      <div class="card-title">データ（DB）</div>
      <div class="inline-row">
        <label style="margin:0">表示する月</label>
        <select id="db-month-sel" onchange="renderDbTable()" style="width:150px"></select>
        <span id="db-count" style="font-size:.8rem;color:var(--text2)"></span>
      </div>
      <div id="db-table-wrap"></div>
    </div>

    <div class="card" id="del-card" style="display:none">
      <div class="card-title">削除プレビュー</div>
      <div id="del-preview"></div>
      <div class="form-group" style="margin-top:12px;display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="confirm-del" style="width:16px;height:16px" />
        <label for="confirm-del" style="margin:0;cursor:pointer">削除してOK（戻せません）</label>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteChecked()" style="margin-top:8px">
        チェックした行を削除
      </button>
      <div id="del-result" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <div class="card-title">CSVエクスポート</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="downloadCsvMonth()">📤 表示中の月をCSV</button>
        <button class="btn btn-secondary btn-sm" onclick="downloadCsvAll()">📦 全データをCSV</button>
      </div>
    </div>
  </div>

  <!-- ── インポートタブ ── -->
  <div id="tab-import" class="tab-panel">
    <div class="card">
      <div class="card-title">バックアップ / 復元（CSV → DB）</div>
      <p style="font-size:.8rem;color:var(--text2);margin-bottom:16px">
        ⚠ インポートは上書き保存（同日なら更新）。実行前に全データCSVを手元に保存推奨。
      </p>
      <div class="file-drop" id="file-drop"
           onclick="document.getElementById('csv-file').click()"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="onFileDrop(event)">
        📂 CSVファイルをここにドロップ or クリックして選択
      </div>
      <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="onFileSelect(event)" />
      <div id="import-preview" style="margin-top:14px"></div>
    </div>
  </div>

  <!-- ── レポートタブ ── -->
  <div id="tab-report" class="tab-panel">
    <div class="card">
      <div class="card-title">レポート生成</div>
      <div class="row-2" style="margin-bottom:14px">
        <div>
          <label>対象月（YYYY-MM）</label>
          <select id="rep-month-sel" style="margin-top:4px"></select>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="genMonthReport()">月次レポ生成</button>
        </div>
        <div>
          <label>対象年（YYYY）</label>
          <select id="rep-year-sel" style="margin-top:4px"></select>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="genYearReport()">年次レポ生成</button>
        </div>
      </div>
      <div id="pace-badge-wrap"></div>
      <div id="report-output" style="display:none">
        <div class="report-box" id="report-text"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="copyReport()">📋 コピー</button>
      </div>
    </div>
  </div>
</div>

<!-- ローディング -->
<div id="loading-overlay" class="loading-overlay" style="display:none">
  <div class="box"><div class="spinner"></div><span>処理中...</span></div>
</div>

<script>
// ═══════════════════════════════════════════
// 定数
// ═══════════════════════════════════════════
const CLIENT_COLS  = ["U","出","R","W","menu","しょんぴ","Afrex","Afresh","ハコベル","pickg","その他"];
const CLIENT_ROW1  = ["U","出","R","W","menu","しょんぴ"];
const CLIENT_ROW2  = ["Afrex","Afresh","ハコベル","pickg","その他"];
const COLUMNS      = [
  "日付","合計売上","合計h","frex h","fresh h","他 h","合計時給","5h+","警告",
  ...CLIENT_COLS,"メモ"
];
const GAS_URL      = ""; // ← デプロイ後に「ウェブアプリのURL」を貼り付け（doPost用）
                         //   同一スクリプトなので空のままでもOK（google.script.run 使用）

// ═══════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════
let token       = sessionStorage.getItem("token") || "";
let currentUser = sessionStorage.getItem("user")  || "";
let allRows     = [];            // DB全データキャッシュ
let clientsMap  = {};            // { "U": 0, ... }
let selectedClient = "U";
let loadedSig   = "";            // 保存済み状態のシグネチャ

// ═══════════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════════
function toInt(s) {
  if (s === null || s === undefined || s === "") return null;
  if (typeof s === "number") return Math.round(s);
  s = String(s).trim().replace(/,/g, "");
  const n = parseFloat(s);
  return isNaN(n) ? null : Math.round(n);
}
function toFloat(s) {
  if (s === null || s === undefined || s === "") return null;
  if (typeof s === "number") return s;
  s = String(s).trim().replace(/,/g, "");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function fmtComma(n) { return Math.round(n).toLocaleString("ja-JP"); }

function loading(show) {
  document.getElementById("loading-overlay").style.display = show ? "flex" : "none";
}

function sig(payload) { return JSON.stringify(payload, Object.keys(payload).sort()); }

function currentPayload() {
  const clients = {};
  CLIENT_COLS.forEach(c => clients[c] = toInt(clientsMap[c]) || 0);
  return {
    total_h:  (document.getElementById("total-h").value || "").trim(),
    frex_h:   (document.getElementById("frex-h").value || "").trim(),
    fresh_h:  (document.getElementById("fresh-h").value || "").trim(),
    memo:     (document.getElementById("memo").value || "").trim(),
    clients,
  };
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ═══════════════════════════════════════════
// GAS API 呼び出し
// ═══════════════════════════════════════════
function callGas(body) {
  return new Promise((resolve, reject) => {
    // google.script.run が使える場合（同一 GAS webapp 内）
    if (typeof google !== "undefined" && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(r => resolve(r))
        .withFailureHandler(e => reject(e))
        .dispatch(body.action, body);
    } else {
      // フォールバック: fetch（スタンドアロン利用時）
      fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })
      .then(r => r.json())
      .then(resolve)
      .catch(reject);
    }
  });
}

// ═══════════════════════════════════════════
// 認証
// ═══════════════════════════════════════════
async function doLogin() {
  const user = document.getElementById("login-user").value.trim();
  const pass = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-err");
  errEl.style.display = "none";
  loading(true);
  try {
    const res = await callGas({ action: "login", username: user, password: pass });
    if (res.ok) {
      token = res.token;
      currentUser = res.username;
      sessionStorage.setItem("token", token);
      sessionStorage.setItem("user", currentUser);
      showMain();
    } else {
      errEl.textContent = res.error || "ログイン失敗";
      errEl.style.display = "flex";
    }
  } catch(e) {
    errEl.textContent = "通信エラー: " + e.message;
    errEl.style.display = "flex";
  } finally { loading(false); }
}

function doLogout() {
  token = ""; currentUser = "";
  sessionStorage.removeItem("token");
  sessionStorage.removeItem("user");
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

// Enter でログイン
document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

window.addEventListener("DOMContentLoaded", async () => {
  buildPills();
  document.getElementById("date-input").value = today();

  if (token) {
    showMain();
  }
});

async function showMain() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-screen").style.display = "block";
  document.getElementById("header-user").textContent = currentUser;

  loading(true);
  try {
    await loadAll();
    await loadDateRow(document.getElementById("date-input").value);
  } finally { loading(false); }
}

// ═══════════════════════════════════════════
// タブ切り替え
// ═══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    const names = ["input","data","import","report"];
    b.classList.toggle("active", names[i] === name);
  });
  document.querySelectorAll(".tab-panel").forEach(p => {
    p.classList.toggle("active", p.id === "tab-" + name);
  });
  if (name === "data")   renderDbTable();
  if (name === "report") renderReportSelects();
}

// ═══════════════════════════════════════════
// 取引先ピル
// ═══════════════════════════════════════════
function buildPills() {
  CLIENT_COLS.forEach(c => { clientsMap[c] = 0; });

  function makePill(c, rowId) {
    const el = document.createElement("button");
    el.className = "pill";
    el.id = "pill-" + c;
    el.textContent = c;
    el.onclick = () => selectClient(c);
    document.getElementById(rowId).appendChild(el);
  }
  CLIENT_ROW1.forEach(c => makePill(c, "pills-row1"));
  CLIENT_ROW2.forEach(c => makePill(c, "pills-row2"));
  selectClient("U");
}

function selectClient(c) {
  selectedClient = c;
  document.querySelectorAll(".pill").forEach(el => el.classList.remove("selected"));
  const el = document.getElementById("pill-" + c);
  if (el) el.classList.add("selected");
  document.getElementById("sel-client-label").textContent = c;
  const v = clientsMap[c] || 0;
  document.getElementById("client-amount").value = v ? String(v) : "";
}

function onClientAmountInput() {
  const raw = document.getElementById("client-amount").value.replace(/[^0-9]/g, "");
  const num = parseInt(raw, 10) || 0;
  clientsMap[selectedClient] = num;
  updateTotalSales();
  checkDirty();
}

function updateTotalSales() {
  const total = CLIENT_COLS.reduce((s, c) => s + (toInt(clientsMap[c]) || 0), 0);
  document.getElementById("total-sales-num").textContent = fmtComma(total);
  const bdEl = document.getElementById("client-breakdown");
  bdEl.innerHTML = "";
  CLIENT_COLS.forEach(c => {
    const v = toInt(clientsMap[c]) || 0;
    if (v !== 0) {
      const d = document.createElement("div");
      d.className = "breakdown-item";
      d.innerHTML = `${c} <span>${fmtComma(v)}</span>`;
      bdEl.appendChild(d);
    }
  });
}

// ═══════════════════════════════════════════
// 日付変更
// ═══════════════════════════════════════════
async function onDateChange() {
  const key = document.getElementById("date-input").value;
  loading(true);
  try { await loadDateRow(key); } finally { loading(false); }
}

async function loadDateRow(key) {
  const res = await callGas({ action: "loadRow", token, dateKey: key });
  if (!res.ok) return;
  const row = res.row;
  if (row) {
    document.getElementById("total-h").value = row["合計h"] || "";
    document.getElementById("frex-h").value  = row["frex h"] || "";
    document.getElementById("fresh-h").value = row["fresh h"] || "";
    document.getElementById("memo").value    = row["メモ"] || "";
    CLIENT_COLS.forEach(c => { clientsMap[c] = toInt(row[c]) || 0; });
  } else {
    document.getElementById("total-h").value = "";
    document.getElementById("frex-h").value  = "";
    document.getElementById("fresh-h").value = "";
    document.getElementById("memo").value    = "";
    CLIENT_COLS.forEach(c => { clientsMap[c] = 0; });
  }
  selectClient(selectedClient);
  updateTotalSales();
  loadedSig = sig(currentPayload());
  document.getElementById("dirty-alert").style.display = "none";
}

function onAnyInput() { checkDirty(); }

function checkDirty() {
  const dirty = loadedSig !== "" && sig(currentPayload()) !== loadedSig;
  document.getElementById("dirty-alert").style.display = dirty ? "flex" : "none";
}

// ═══════════════════════════════════════════
// 保存
// ═══════════════════════════════════════════
async function saveRow() {
  const key    = document.getElementById("date-input").value;
  const totalH = toFloat(document.getElementById("total-h").value) || 0;
  const frexH  = toFloat(document.getElementById("frex-h").value)  || 0;
  const freshH = toFloat(document.getElementById("fresh-h").value) || 0;
  const otherH = Math.max(0, totalH - frexH - freshH);
  const clients = {};
  CLIENT_COLS.forEach(c => { clients[c] = toInt(clientsMap[c]) || 0; });
  const totalSales = CLIENT_COLS.reduce((s, c) => s + (clients[c] || 0), 0);
  const hourly     = totalH > 0 ? Math.round(totalSales / totalH) : "";
  const flag5h     = totalH >= 5.0 ? "5h+" : "";
  const warn       = totalSales > 0 && totalH <= 0 ? "⚠ 売上あり/時間0" : "";

  const row = {
    "日付":   key,
    "合計売上": totalSales || "",
    "合計h":  totalH || "",
    "frex h": frexH || "",
    "fresh h": freshH || "",
    "他 h":   otherH || "",
    "合計時給": hourly,
    "5h+":   flag5h,
    "警告":   warn,
    "メモ":   document.getElementById("memo").value || "",
  };
  CLIENT_COLS.forEach(c => { row[c] = clients[c] || ""; });

  loading(true);
  const resultEl = document.getElementById("save-result");
  try {
    const res = await callGas({ action: "upsertRow", token, row });
    if (res.ok) {
      resultEl.innerHTML = `<div class="alert alert-success">✅ 保存しました: ${key}</div>`;
      loadedSig = sig(currentPayload());
      document.getElementById("dirty-alert").style.display = "none";
      await loadAll();
    } else {
      resultEl.innerHTML = `<div class="alert alert-error">❌ 保存失敗: ${res.error}</div>`;
    }
  } catch(e) {
    resultEl.innerHTML = `<div class="alert alert-error">❌ エラー: ${e.message}</div>`;
  } finally { loading(false); setTimeout(() => { resultEl.innerHTML = ""; }, 4000); }
}

// ═══════════════════════════════════════════
// DB 全件ロード
// ═══════════════════════════════════════════
async function loadAll() {
  const res = await callGas({ action: "loadAll", token });
  if (res.ok) {
    allRows = res.rows || [];
    renderMonthSelects();
  }
}

// ═══════════════════════════════════════════
// データタブ
// ═══════════════════════════════════════════
function getMonths() {
  const s = new Set();
  allRows.forEach(r => { const d = r["日付"]; if (d) s.add(d.slice(0, 7)); });
  return [...s].sort();
}
function getYears() {
  const s = new Set();
  allRows.forEach(r => { const d = r["日付"]; if (d) s.add(d.slice(0, 4)); });
  return [...s].sort();
}

function renderMonthSelects() {
  const months = getMonths();
  const latest = months[months.length - 1] || "";

  const sel = document.getElementById("db-month-sel");
  sel.innerHTML = months.map(m => `<option value="${m}" ${m===latest?"selected":""}>${m}</option>`).join("");

  renderDbTable();
}

function renderDbTable() {
  const month = document.getElementById("db-month-sel").value;
  const rows  = allRows.filter(r => (r["日付"] || "").startsWith(month + "-"))
                        .sort((a, b) => a["日付"] > b["日付"] ? 1 : -1);
  document.getElementById("db-count").textContent = `${rows.length} 行`;

  const wrap = document.getElementById("db-table-wrap");
  if (!rows.length) { wrap.innerHTML = '<p style="color:var(--text2);font-size:.85rem;padding:10px 0">データがありません</p>'; return; }

  const cols = ["日付","合計売上","合計h","frex h","fresh h","合計時給","5h+","警告","メモ",...CLIENT_COLS];
  let html = '<div class="table-wrap"><table><thead><tr><th class="cb-cell">選択</th>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += "</tr></thead><tbody>";
  rows.forEach((r, i) => {
    html += `<tr><td class="cb-cell"><input type="checkbox" data-idx="${i}" onchange="onCheckRow()" /></td>`;
    cols.forEach(c => html += `<td>${r[c] || ""}</td>`);
    html += "</tr>";
  });
  html += "</tbody></table></div>";
  wrap.innerHTML = html;
  wrap._rows = rows;  // 参照保持

  document.getElementById("del-card").style.display = "none";
}

function onCheckRow() {
  const wrap  = document.getElementById("db-table-wrap");
  const month = document.getElementById("db-month-sel").value;
  const rows  = allRows.filter(r => (r["日付"] || "").startsWith(month + "-"))
                        .sort((a, b) => a["日付"] > b["日付"] ? 1 : -1);
  const checked = [...document.querySelectorAll("#db-table-wrap input[type=checkbox]:checked")];
  const picked  = checked.map(cb => rows[parseInt(cb.dataset.idx)]);

  const card = document.getElementById("del-card");
  const prev = document.getElementById("del-preview");
  if (!picked.length) { card.style.display = "none"; return; }
  card.style.display = "block";

  const cols = ["日付","合計売上","合計h","メモ"];
  let html = '<div class="table-wrap"><table><thead><tr>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += "</tr></thead><tbody>";
  picked.forEach(r => {
    html += "<tr>";
    cols.forEach(c => html += `<td>${r[c] || ""}</td>`);
    html += "</tr>";
  });
  html += "</tbody></table></div>";
  prev.innerHTML = html;
  prev._picked = picked;
  document.getElementById("confirm-del").checked = false;
}

async function deleteChecked() {
  const prev = document.getElementById("del-preview");
  const picked = prev._picked || [];
  if (!picked.length) return;
  if (!document.getElementById("confirm-del").checked) {
    document.getElementById("del-result").innerHTML = '<div class="alert alert-warn">チェックを入れてから押してね</div>';
    return;
  }
  const keys = picked.map(r => r["日付"]);
  loading(true);
  try {
    const res = await callGas({ action: "deleteRows", token, dateKeys: keys });
    if (res.ok) {
      document.getElementById("del-result").innerHTML =
        `<div class="alert alert-success">✅ 削除: ${keys.join(", ")}</div>`;
      await loadAll();
      renderDbTable();
    } else {
      document.getElementById("del-result").innerHTML =
        `<div class="alert alert-error">❌ ${res.error}</div>`;
    }
  } catch(e) {
    document.getElementById("del-result").innerHTML =
      `<div class="alert alert-error">❌ ${e.message}</div>`;
  } finally { loading(false); }
}

// ── CSVエクスポート ──
function rowsToCsv(rows) {
  const header = COLUMNS.join(",");
  const body = rows.map(r =>
    COLUMNS.map(c => {
      const v = String(r[c] || "");
      return v.includes(",") || v.includes('"') ? `"${v.replace(/"/g, '""')}"` : v;
    }).join(",")
  ).join("\n");
  return "\uFEFF" + header + "\n" + body;
}

function downloadCsv(content, filename) {
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(content);
  a.download = filename;
  a.click();
}

function downloadCsvMonth() {
  const month = document.getElementById("db-month-sel").value;
  const rows  = allRows.filter(r => (r["日付"] || "").startsWith(month + "-"))
                        .sort((a, b) => a["日付"] > b["日付"] ? 1 : -1);
  downloadCsv(rowsToCsv(rows), `monthly_${month}.csv`);
}

function downloadCsvAll() {
  const d = new Date().toISOString().slice(0, 10);
  downloadCsv(rowsToCsv(allRows), `monthly_all_${d}.csv`);
}

// ═══════════════════════════════════════════
// インポートタブ
// ═══════════════════════════════════════════
let importDf = null;

function onFileSelect(e) { handleFile(e.target.files[0]); }
function onFileDrop(e) {
  e.preventDefault();
  document.getElementById("file-drop").classList.remove("drag");
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseImportCsv(ev.target.result, file.name);
  reader.readAsText(file, "UTF-8");
}

function parseImportCsv(text, filename) {
  // BOM除去
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/);
  const header = lines[0].split(",").map(s => s.trim().replace(/^"|"$/g, ""));
  if (!header.includes("日付")) {
    document.getElementById("import-preview").innerHTML =
      '<div class="alert alert-error">CSVに「日付」列がありません</div>';
    return;
  }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCsvLine(lines[i]);
    const row = {};
    header.forEach((h, idx) => { row[h] = vals[idx] || ""; });
    COLUMNS.forEach(c => { if (!(c in row)) row[c] = ""; });
    rows.push(row);
  }
  importDf = rows;

  const dates  = rows.map(r => r["日付"]).filter(Boolean).sort();
  const months = [...new Set(dates.map(d => d.slice(0, 7)))].sort();
  const minD   = dates[0] || "-";
  const maxD   = dates[dates.length - 1] || "-";

  let html = `
    <div class="alert alert-info">CSV: 月=${months.join(", ")} / 件数=${rows.length} 行 / 日付範囲=${minD}〜${maxD}</div>
    <p style="font-size:.83rem;color:var(--text2);margin-bottom:10px">プレビュー（先頭10行）</p>
    <div class="table-wrap" style="margin-bottom:14px"><table><thead><tr>
  `;
  const previewCols = ["日付","合計売上","合計h","frex h","fresh h","メモ"];
  previewCols.forEach(c => html += `<th>${c}</th>`);
  html += "</tr></thead><tbody>";
  rows.slice(0, 10).forEach(r => {
    html += "<tr>";
    previewCols.forEach(c => html += `<td>${r[c] || ""}</td>`);
    html += "</tr>";
  });
  html += `</tbody></table></div>`;

  html += `
    <div style="margin-bottom:12px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="strict-month" style="width:16px;height:16px" />
        ✅（月次CSV向け）この月のDBを先に全削除してから復元
      </label>
      <p style="font-size:.78rem;color:var(--text3);margin-top:4px;padding-left:24px">
        monthly_YYYY-MM.csv を入れるときだけ推奨
      </p>
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px">
      <input type="checkbox" id="confirm-import" style="width:16px;height:16px" />
      インポートしてOK（上書きが発生する場合があります）
    </label>
    <div id="import-result"></div>
    <button class="btn btn-primary btn-sm" onclick="doImport()">
      📥 CSVをDBへインポート
    </button>
  `;
  document.getElementById("import-preview").innerHTML = html;
  document.getElementById("import-preview")._months = months;
}

function parseCsvLine(line) {
  const res = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === "," && !inQ) { res.push(cur); cur = ""; }
    else cur += ch;
  }
  res.push(cur);
  return res;
}

async function doImport() {
  if (!importDf || !importDf.length) {
    document.getElementById("import-result").innerHTML =
      '<div class="alert alert-error">ファイルを先に選択してください</div>';
    return;
  }
  if (!document.getElementById("confirm-import").checked) {
    document.getElementById("import-result").innerHTML =
      '<div class="alert alert-warn">チェックを入れてから押してね</div>';
    return;
  }
  const strictMonth = document.getElementById("strict-month").checked;
  const months = document.getElementById("import-preview")._months || [];
  if (strictMonth && months.length !== 1) {
    document.getElementById("import-result").innerHTML =
      `<div class="alert alert-error">月削除は1ヶ月分のCSV専用です（検出月: ${months.join(", ")}）</div>`;
    return;
  }

  loading(true);
  try {
    const res = await callGas({
      action: "importCsv", token,
      rows: importDf,
      strictMonth,
      monthPrefix: months[0] || "",
    });
    if (res.ok) {
      document.getElementById("import-result").innerHTML =
        `<div class="alert alert-success">✅ インポート完了: ${res.count} 行</div>`;
      importDf = null;
      document.getElementById("import-preview").innerHTML = "";
      document.getElementById("csv-file").value = "";
      await loadAll();
    } else {
      document.getElementById("import-result").innerHTML =
        `<div class="alert alert-error">❌ ${res.error}</div>`;
    }
  } catch(e) {
    document.getElementById("import-result").innerHTML =
      `<div class="alert alert-error">❌ ${e.message}</div>`;
  } finally { loading(false); }
}

// ═══════════════════════════════════════════
// レポートタブ
// ═══════════════════════════════════════════
function renderReportSelects() {
  const months = getMonths();
  const years  = getYears();
  const msel   = document.getElementById("rep-month-sel");
  const ysel   = document.getElementById("rep-year-sel");
  const now    = new Date();
  const curM   = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const curY   = String(now.getFullYear());
  msel.innerHTML = months.map(m => `<option value="${m}" ${m===curM?"selected":""}>${m}</option>`).join("");
  ysel.innerHTML = years.map(y => `<option value="${y}" ${y===curY?"selected":""}>${y}</option>`).join("");
}

async function genMonthReport() {
  const monthStr = document.getElementById("rep-month-sel").value;
  if (!monthStr) return;
  loading(true);
  try {
    const res = await callGas({ action: "reportMonth", token, monthStr });
    if (res.ok) {
      showReport(res.text, res.pace);
    }
  } catch(e) { alert(e.message); } finally { loading(false); }
}

async function genYearReport() {
  const year = document.getElementById("rep-year-sel").value;
  if (!year) return;
  loading(true);
  try {
    const res = await callGas({ action: "reportYear", token, year: parseInt(year) });
    if (res.ok) showReport(res.text, null);
  } catch(e) { alert(e.message); } finally { loading(false); }
}

function showReport(text, pace) {
  const pbw = document.getElementById("pace-badge-wrap");
  pbw.innerHTML = "";
  if (pace && pace.show) {
    const sign = pace.diff >= 0 ? "+" : "";
    pbw.innerHTML = `
      <div class="pace-badge ${pace.ok ? "pace-ok" : "pace-ng"}">
        ${pace.ok ? "⭕️" : "❌"} ペース判定
        理想累計 ${fmtComma(pace.idealCum)}円 / 実績 ${fmtComma(pace.actual)}円 / 差分 ${sign}${fmtComma(pace.diff)}円
      </div>`;
  }
  document.getElementById("report-text").textContent = text;
  document.getElementById("report-output").style.display = "block";
}

function copyReport() {
  const t = document.getElementById("report-text").textContent;
  navigator.clipboard.writeText(t).then(() => alert("コピーしました"));
}
