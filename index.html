<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tatsunori-dev/gas-monthly-input/main/icons/monthly.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tatsunori-dev/gas-monthly-input/main/icons/monthly.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="月次入力">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>月次入力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #e8607a;
    --accent2: #c45070;
    --green: #34c77b;
    --red: #f05b5b;
    --yellow: #f0c05b;
    --text: #e2e6f3;
    --text2: #8892b0;
    --text3: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --radius: 10px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    min-height: 100%;
    overscroll-behavior: none;
  }

  /* ───────────────────────
     ログイン画面
  ─────────────────────── */
  #login-screen {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #2a1520 0%, var(--bg) 70%);
    padding: 20px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .login-title {
    font-size: 1.5rem; font-weight: 700; margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-subtitle { font-size: .85rem; color: var(--text3); margin-bottom: 28px; }

  /* ───────────────────────
     メイン画面
  ─────────────────────── */
  #main-screen { display: none; width: 100%; overflow-x: hidden; }

  /* 上部ヘッダー */
  .sp-header {
    width: 100%;
    background: #1a1215;
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    overflow: hidden;
  }
  .sp-header-title {
    font-size: 1rem; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sp-header-user { font-size: .72rem; color: var(--text3); }

  /* コンテンツ */
  .content-area {
    width: 100%;
    max-width: 100%;
    padding: 12px 10px calc(var(--nav-h) + 14px);
    overflow-x: hidden;
  }

  /* タブ */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 下部ナビ */
  .sp-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: #1a1215;
    border-top: 1px solid var(--border);
    z-index: 200;
  }
  .sp-nav-inner { display: flex; height: 100%; }
  .sp-nav-btn {
    flex: 1; background: none; border: none; color: var(--text3);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; font-family: var(--sans); transition: color .2s;
    font-size: 0;
  }
  .sp-nav-btn.active { color: var(--accent); }
  .sp-nav-btn .ni { font-size: 1.4rem; line-height: 1; display: block; }
  .sp-nav-btn .nl { font-size: .6rem; display: block; }

  /* ───────────────────────
     共通パーツ
  ─────────────────────── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: .7rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
  }
  .form-group { margin-bottom: 14px; }
  label { font-size: .82rem; color: var(--text2); display: block; margin-bottom: 6px; }

  input[type=text], input[type=password], input[type=date], textarea, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 13px 14px;
    font-family: var(--sans); font-size: 16px;
    transition: border-color .2s; -webkit-appearance: none; appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,138,240,.15);
  }
  textarea { resize: vertical; min-height: 80px; }
  select { cursor: pointer; }
  select option { background: var(--surface); }

  /* 取引先ピル */
  .pills-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .pill {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text2); padding: 9px 14px; border-radius: 22px;
    cursor: pointer; font-size: .88rem; font-family: var(--sans);
    transition: all .15s; white-space: nowrap; user-select: none;
    min-height: 42px; display: flex; align-items: center;
  }
  .pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .pill:active { transform: scale(.95); }
  /* スマホ: 3列グリッド */
  body.sp .pills-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  body.sp .pill { justify-content: center; padding: 10px 8px; font-size: .84rem; }
  /* PC: flex折り返し */
  body.pc .pills-row { display: flex; flex-wrap: wrap; gap: 8px; }

  /* 合計売上 */
  .total-sales-box {
    background: linear-gradient(135deg, #251520, #1a1d27);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin: 14px 0;
  }
  .total-sales-label { font-size: .74rem; color: var(--text2); margin-bottom: 4px; }
  .total-sales-num { font-family: var(--mono); font-size: 2rem; font-weight: 600; color: var(--green); }
  .total-sales-unit { font-size: .82rem; color: var(--text2); margin-left: 4px; }
  .client-breakdown { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .breakdown-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: .76rem;
    font-family: var(--mono); color: var(--text2);
  }
  .breakdown-item span { color: var(--text); font-weight: 600; }

  /* ボタン */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 14px 20px; border-radius: 10px; border: none;
    cursor: pointer; font-family: var(--sans); font-size: .95rem; font-weight: 600;
    transition: all .18s; min-height: 50px; width: 100%;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:active { opacity: .8; transform: scale(.98); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:active { opacity: .8; }
  .btn-sm { padding: 11px 16px; font-size: .86rem; min-height: 44px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* アラート */
  .alert {
    padding: 12px 14px; border-radius: 9px; font-size: .86rem;
    margin-bottom: 12px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
  }
  .alert-warn    { background: rgba(240,192,91,.12); border: 1px solid rgba(240,192,91,.35); color: var(--yellow); }
  .alert-success { background: rgba(52,199,123,.12); border: 1px solid rgba(52,199,123,.35); color: var(--green); }
  .alert-error   { background: rgba(240,91,91,.12);  border: 1px solid rgba(240,91,91,.35);  color: var(--red); }
  .alert-info    { background: rgba(91,138,240,.1);  border: 1px solid rgba(91,138,240,.3);  color: var(--accent); }

  /* テーブル */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th { background: var(--surface2); padding: 9px 10px; text-align: left; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .cb-cell { text-align: center; width: 38px; }
  input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

  /* レポート */
  .report-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    font-family: var(--mono); font-size: .76rem; white-space: pre-wrap; line-height: 1.7;
    color: var(--text2); max-height: 460px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .pace-badge {
    display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
    padding: 12px 14px; border-radius: 9px;
    font-size: .86rem; margin-bottom: 12px; font-weight: 600; line-height: 1.4;
  }
  .pace-ok { background: rgba(52,199,123,.15); border: 1px solid rgba(52,199,123,.4); color: var(--green); }
  .pace-ng { background: rgba(240,91,91,.12);  border: 1px solid rgba(240,91,91,.4);  color: var(--red); }

  /* ファイルドロップ */
  .file-drop {
    border: 2px dashed var(--border); border-radius: 9px; padding: 32px 16px;
    text-align: center; cursor: pointer; transition: border-color .2s;
    color: var(--text2); font-size: .9rem; line-height: 1.7;
  }
  .file-drop:active, .file-drop.drag { border-color: var(--accent); color: var(--accent); }

  /* ローディング */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(4px); }
  .loading-overlay .box { background: var(--surface); border: 1px solid var(--border); padding: 22px 30px; border-radius: 14px; display: flex; align-items: center; gap: 14px; font-size: .93rem; color: var(--text2); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  /* ───────────────────────
     PC用ヘッダー・タブバー
  ─────────────────────── */
  .pc-header {
    background: linear-gradient(135deg, #1a1d27, #141828);
    border-bottom: 1px solid var(--border);
    padding: 13px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .pc-title {
    font-size: 1rem; font-weight: 700; letter-spacing: .04em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .pc-user-badge { display: flex; align-items: center; gap: 10px; font-size: .8rem; color: var(--text2); }
  .btn-logout {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: .78rem; transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .pc-tab-bar {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 20px; background: var(--surface); overflow-x: auto;
  }
  .pc-tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); padding: 11px 20px; cursor: pointer;
    font-size: .86rem; font-family: var(--sans); transition: all .2s; white-space: nowrap;
  }
  .pc-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .pc-tab-btn:hover:not(.active) { color: var(--text); }

  /* SP/PC 切り替え */
  .pc-header  { display: none; }
  .pc-tab-bar { display: none; }

  body.sp .pc-header  { display: none !important; }
  body.sp .pc-tab-bar { display: none !important; }
  body.sp .sp-header  { display: flex !important; }
  body.sp .sp-nav     { display: block !important; }
  body.sp .content-area { padding: 12px 10px calc(var(--nav-h) + 14px); }
  body.sp .row-3 { display: flex; flex-direction: column; gap: 12px; }

  body.pc .pc-header  { display: flex !important; }
  body.pc .pc-tab-bar { display: flex !important; }
  body.pc .sp-header  { display: none !important; }
  body.pc .sp-nav     { display: none !important; }
  body.pc .content-area { max-width: 900px; margin: 0 auto; padding: 24px 24px; }
  body.pc .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  body.pc .btn  { min-height: 44px; }
  body.pc .btn-sm { min-height: 38px; }
</style>
</head>
<body>

<!-- ═══ ログイン ═══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">📊 月次入力</div>
    <div class="login-subtitle">ログインして続行</div>
    <div class="form-group">
      <label>ユーザー名</label>
      <input type="text" id="login-user" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pass" autocomplete="current-password" />
    </div>
    <div id="login-err" class="alert alert-error" style="display:none"></div>
    <button class="btn btn-primary" style="margin-top:10px" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ═══ メイン ═══ -->
<div id="main-screen">

  <!-- PC ヘッダー -->
  <header class="pc-header">
    <div class="pc-title">📊 月次入力</div>
    <div class="pc-user-badge">
      <span id="pc-header-user"></span>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </header>
  <!-- PC タブバー -->
  <nav class="pc-tab-bar">
    <button class="pc-tab-btn active" onclick="switchTab('input')">📝 入力</button>
    <button class="pc-tab-btn" onclick="switchTab('data')">📋 データ</button>
    <button class="pc-tab-btn" onclick="switchTab('import')">📥 インポート</button>
    <button class="pc-tab-btn" onclick="switchTab('report')">📈 レポート</button>
  </nav>

  <!-- SP ヘッダー -->
  <header class="sp-header">
    <div class="sp-header-title">📊 月次入力</div>
    <div class="sp-header-user" id="sp-header-user"></div>
  </header>

  <!-- コンテンツ -->
  <div class="content-area">

    <!-- 入力タブ -->
    <div id="tab-input" class="tab-panel active">
      <div class="card">
        <div class="card-title">日付 / 時間</div>
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="date-input" onchange="onDateChange()" />
        </div>
        <div class="row-3">
        <div class="form-group">
          <label>合計 h</label>
          <input type="text" id="total-h" placeholder="例: 6.5" inputmode="decimal" oninput="onAnyInput()" />
        </div>
        <div class="form-group">
          <label>frex h</label>
          <input type="text" id="frex-h" placeholder="例: 2" inputmode="decimal" oninput="onAnyInput()" />
        </div>
        <div class="form-group">
          <label>fresh h</label>
          <input type="text" id="fresh-h" placeholder="例: 1.5" inputmode="decimal" oninput="onAnyInput()" />
        </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <textarea id="memo" placeholder="メモを入力..." oninput="onAnyInput()"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-title">取引先</div>
        <div id="pills-row" class="pills-row"></div>
        <div class="form-group" style="margin-top:14px">
          <label>金額 — <span id="sel-client-label" style="color:var(--accent);font-weight:700"></span></label>
          <input type="text" id="client-amount" placeholder="例: 12000" inputmode="numeric" oninput="onClientAmountInput()" />
        </div>
        <div class="total-sales-box">
          <div class="total-sales-label">合計売上（自動計算）</div>
          <div>
            <span class="total-sales-num" id="total-sales-num">0</span>
            <span class="total-sales-unit">円</span>
          </div>
        </div>
        <div id="client-breakdown" class="client-breakdown"></div>
      </div>

      <div id="dirty-alert" class="alert alert-warn" style="display:none">⚠ 未保存の変更があります</div>
      <div id="save-result"></div>
      <button class="btn btn-primary" onclick="saveRow()">💾 保存（同日なら上書き）</button>
    </div>

    <!-- データタブ -->
    <div id="tab-data" class="tab-panel">
      <div class="card">
        <div class="card-title">データ（DB）</div>
        <div class="form-group">
          <label>表示する月</label>
          <select id="db-month-sel" onchange="renderDbTable()"></select>
        </div>
        <div id="db-count" style="font-size:.76rem;color:var(--text2);margin-bottom:10px"></div>
        <div id="db-table-wrap"></div>
      </div>
      <div class="card" id="del-card" style="display:none">
        <div class="card-title">削除プレビュー</div>
        <div id="del-preview"></div>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:14px 0">
          <input type="checkbox" id="confirm-del" style="width:20px;height:20px" />
          <span style="font-size:.88rem">削除してOK（戻せません）</span>
        </label>
        <button class="btn btn-danger btn-sm" onclick="deleteChecked()">チェックした行を削除</button>
        <div id="del-result" style="margin-top:10px"></div>
      </div>
      <div class="card">
        <div class="card-title">CSVエクスポート</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-secondary btn-sm" onclick="downloadCsvMonth()">📤 表示中の月をCSV</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadCsvAll()">📦 全データをCSV</button>
        </div>
      </div>
    </div>

    <!-- インポートタブ -->
    <div id="tab-import" class="tab-panel">
      <div class="card">
        <div class="card-title">バックアップ / 復元</div>
        <p style="font-size:.82rem;color:var(--text2);margin-bottom:16px;line-height:1.6">⚠ 上書き保存になります。実行前に全データCSVを保存推奨。</p>
        <div class="file-drop" id="file-drop"
             onclick="document.getElementById('csv-file').click()"
             ondragover="event.preventDefault();this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="onFileDrop(event)">
          📂 CSVをタップして選択<br>
          <span style="font-size:.76rem;color:var(--text3)">またはドラッグ＆ドロップ</span>
        </div>
        <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="onFileSelect(event)" />
        <div id="import-preview" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- レポートタブ -->
    <div id="tab-report" class="tab-panel">
      <div class="card">
        <div class="card-title">レポート生成</div>
        <div class="form-group">
          <label>対象月（YYYY-MM）</label>
          <select id="rep-month-sel"></select>
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-bottom:16px" onclick="genMonthReport()">📊 月次レポ生成</button>
        <div class="form-group">
          <label>対象年（YYYY）</label>
          <select id="rep-year-sel"></select>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="genYearReport()">📈 年次レポ生成</button>
      </div>
      <div id="pace-badge-wrap"></div>
      <div id="report-output" style="display:none">
        <div class="card" style="padding:0;overflow:hidden">
          <div class="report-box" id="report-text"></div>
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="copyReport()">📋 コピー</button>
      </div>
    </div>

  </div><!-- /content-area -->

  <!-- 下部ナビ -->
  <nav class="sp-nav">
    <div class="sp-nav-inner">
      <button class="sp-nav-btn active" id="mnav-input" onclick="switchTab('input')">
        <span class="ni">📝</span><span class="nl">入力</span>
      </button>
      <button class="sp-nav-btn" id="mnav-data" onclick="switchTab('data')">
        <span class="ni">📋</span><span class="nl">データ</span>
      </button>
      <button class="sp-nav-btn" id="mnav-import" onclick="switchTab('import')">
        <span class="ni">📥</span><span class="nl">インポート</span>
      </button>
      <button class="sp-nav-btn" id="mnav-report" onclick="switchTab('report')">
        <span class="ni">📈</span><span class="nl">レポート</span>
      </button>
      <button class="sp-nav-btn" onclick="doLogout()">
        <span class="ni">🚪</span><span class="nl">ログアウト</span>
      </button>
    </div>
  </nav>

</div><!-- /main-screen -->

<div id="loading-overlay" class="loading-overlay" style="display:none">
  <div class="box"><div class="spinner"></div><span>処理中...</span></div>
</div>

<script>
// ─── レイアウト切り替え ───
const SP_BREAK = 640;
function applyLayout() {
  const w = document.documentElement.clientWidth || window.innerWidth || 375;
  if (w >= SP_BREAK) {
    document.body.classList.add("pc");
    document.body.classList.remove("sp");
  } else {
    document.body.classList.add("sp");
    document.body.classList.remove("pc");
  }
}
applyLayout();
document.addEventListener("DOMContentLoaded", applyLayout);
window.addEventListener("resize", applyLayout);

const CLIENT_COLS = ["U","出","R","menu","しょんぴ","CW","Afrex","Afresh","ハコベル","pickg","その他"];
const COLUMNS = ["日付","合計売上","合計h","frex h","fresh h","他 h","合計時給","5h+","警告",...CLIENT_COLS,"メモ"];

// ─── 状態 ───
let token = sessionStorage.getItem("token")||"";
let currentUser = sessionStorage.getItem("user")||"";
let allRows = [], clientsMap = {}, selectedClient = "U", loadedSig = "";

// ─── ユーティリティ ───
function toInt(s){if(s===null||s===undefined||s==="")return null;if(typeof s==="number")return Math.round(s);s=String(s).trim().replace(/,/g,"");const n=parseFloat(s);return isNaN(n)?null:Math.round(n);}
function toFloat(s){if(s===null||s===undefined||s==="")return null;if(typeof s==="number")return s;s=String(s).trim().replace(/,/g,"");const n=parseFloat(s);return isNaN(n)?null:n;}
function fmtComma(n){return Math.round(n).toLocaleString("ja-JP");}
function loading(show){document.getElementById("loading-overlay").style.display=show?"flex":"none";}
function sig(p){return JSON.stringify(p,Object.keys(p).sort());}
function currentPayload(){
  const cl={};CLIENT_COLS.forEach(c=>{cl[c]=toInt(clientsMap[c])||0;});
  return{total_h:(document.getElementById("total-h").value||"").trim(),frex_h:(document.getElementById("frex-h").value||"").trim(),fresh_h:(document.getElementById("fresh-h").value||"").trim(),memo:(document.getElementById("memo").value||"").trim(),cl};
}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

// ─── GAS API ───
function callGas(body){
  return new Promise((resolve,reject)=>{
    if(typeof google!=="undefined"&&google.script&&google.script.run){
      google.script.run.withSuccessHandler(r=>resolve(r)).withFailureHandler(e=>reject(e)).dispatch(body.action,body);
    }else{reject(new Error("google.script.run が使えません"));}
  });
}

// ─── 認証 ───
async function doLogin(){
  const user=document.getElementById("login-user").value.trim();
  const pass=document.getElementById("login-pass").value;
  const errEl=document.getElementById("login-err");
  errEl.style.display="none"; loading(true);
  try{
    const res=await callGas({action:"login",username:user,password:pass});
    if(res.ok){token=res.token;currentUser=res.username;sessionStorage.setItem("token",token);sessionStorage.setItem("user",currentUser);showMain();}
    else{errEl.textContent=res.error||"ログイン失敗";errEl.style.display="flex";}
  }catch(e){errEl.textContent="通信エラー: "+e.message;errEl.style.display="flex";}
  finally{loading(false);}
}
function doLogout(){
  token="";currentUser="";sessionStorage.removeItem("token");sessionStorage.removeItem("user");
  document.getElementById("main-screen").style.display="none";
  document.getElementById("login-screen").style.display="flex";
}
document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

// ─── 初期化 ───
window.addEventListener("DOMContentLoaded",async()=>{
  buildPills();
  document.getElementById("date-input").value=today();
  if(token){ showMain(); return; }
  // サーバーサイド自動ログイン（iOS Safari対策）
  loading(true);
  try{
    const res=await callGas({action:"getAutoToken"});
    if(res&&res.ok){
      token=res.token; currentUser=res.username||"";
      try{sessionStorage.setItem("token",token);sessionStorage.setItem("user",currentUser);}catch(e){}
      showMain(); return;
    }
  }catch(e){}
  finally{loading(false);}
});

async function showMain(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("main-screen").style.display="block";
  document.getElementById("sp-header-user").textContent=currentUser;
  const pcUser = document.getElementById("pc-header-user");
  if(pcUser) pcUser.textContent=currentUser;
  loading(true);
  try{await loadAll();await loadDateRow(document.getElementById("date-input").value);}
  finally{loading(false);}
}

// ─── タブ ───
function switchTab(name){
  const names=["input","data","import","report"];
  names.forEach(n=>{const el=document.getElementById("mnav-"+n);if(el)el.classList.toggle("active",n===name);});
  document.querySelectorAll(".pc-tab-btn").forEach((b,i)=>b.classList.toggle("active",names[i]===name));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("active",p.id==="tab-"+name));
  if(name==="data")renderDbTable();
  if(name==="report")renderReportSelects();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ─── 取引先ピル ───
function buildPills(){
  CLIENT_COLS.forEach(c=>{clientsMap[c]=0;});
  const row=document.getElementById("pills-row");
  CLIENT_COLS.forEach(c=>{
    const el=document.createElement("button");
    el.className="pill"; el.id="pill-"+c; el.textContent=c;
    el.onclick=()=>selectClient(c);
    row.appendChild(el);
  });
  selectClient("U");
}
function selectClient(c){
  selectedClient=c;
  document.querySelectorAll(".pill").forEach(el=>el.classList.remove("selected"));
  const el=document.getElementById("pill-"+c);if(el)el.classList.add("selected");
  document.getElementById("sel-client-label").textContent=c;
  const v=clientsMap[c]||0;document.getElementById("client-amount").value=v?String(v):"";
}
function onClientAmountInput(){
  const raw=document.getElementById("client-amount").value.replace(/[^0-9]/g,"");
  clientsMap[selectedClient]=parseInt(raw,10)||0;
  updateTotalSales();checkDirty();
}
function updateTotalSales(){
  const total=CLIENT_COLS.reduce((s,c)=>s+(toInt(clientsMap[c])||0),0);
  document.getElementById("total-sales-num").textContent=fmtComma(total);
  const bdEl=document.getElementById("client-breakdown");bdEl.innerHTML="";
  CLIENT_COLS.forEach(c=>{const v=toInt(clientsMap[c])||0;if(v){const d=document.createElement("div");d.className="breakdown-item";d.innerHTML=`${c} <span>${fmtComma(v)}</span>`;bdEl.appendChild(d);}});
}

// ─── 日付変更 ───
async function onDateChange(){loading(true);try{await loadDateRow(document.getElementById("date-input").value);}finally{loading(false);}}
async function loadDateRow(key){
  const res=await callGas({action:"loadRow",token,dateKey:key});
  if(!res.ok)return;
  const row=res.row;
  if(row){
    document.getElementById("total-h").value=row["合計h"]||"";
    document.getElementById("frex-h").value=row["frex h"]||"";
    document.getElementById("fresh-h").value=row["fresh h"]||"";
    document.getElementById("memo").value=row["メモ"]||"";
    CLIENT_COLS.forEach(c=>{clientsMap[c]=toInt(row[c])||0;});
  }else{
    document.getElementById("total-h").value="";
    document.getElementById("frex-h").value="";
    document.getElementById("fresh-h").value="";
    document.getElementById("memo").value="";
    CLIENT_COLS.forEach(c=>{clientsMap[c]=0;});
  }
  selectClient(selectedClient);updateTotalSales();
  loadedSig=sig(currentPayload());document.getElementById("dirty-alert").style.display="none";
}
function onAnyInput(){checkDirty();}
function checkDirty(){
  const dirty=loadedSig!==""&&sig(currentPayload())!==loadedSig;
  document.getElementById("dirty-alert").style.display=dirty?"flex":"none";
}

// ─── 保存 ───
async function saveRow(){
  const key=document.getElementById("date-input").value;
  const totalH=toFloat(document.getElementById("total-h").value)||0;
  const frexH=toFloat(document.getElementById("frex-h").value)||0;
  const freshH=toFloat(document.getElementById("fresh-h").value)||0;
  const otherH=Math.max(0,totalH-frexH-freshH);
  const clients={};CLIENT_COLS.forEach(c=>{clients[c]=toInt(clientsMap[c])||0;});
  const totalSales=CLIENT_COLS.reduce((s,c)=>s+(clients[c]||0),0);
  const hourly=totalH>0?Math.round(totalSales/totalH):"";
  const row={
    "日付":key,"合計売上":totalSales||"","合計h":totalH||"",
    "frex h":frexH||"","fresh h":freshH||"","他 h":otherH||"",
    "合計時給":hourly,"5h+":totalH>=5?"5h+":"",
    "警告":totalSales>0&&totalH<=0?"⚠ 売上あり/時間0":"",
    "メモ":document.getElementById("memo").value||""
  };
  CLIENT_COLS.forEach(c=>{row[c]=clients[c]||"";});
  loading(true);
  const resultEl=document.getElementById("save-result");
  try{
    const res=await callGas({action:"upsertRow",token,row});
    if(res.ok){
      resultEl.innerHTML=`<div class="alert alert-success">✅ 保存しました: ${key}</div>`;
      loadedSig=sig(currentPayload());
      document.getElementById("dirty-alert").style.display="none";
      await loadAll();
    }else{resultEl.innerHTML=`<div class="alert alert-error">❌ ${res.error}</div>`;}
  }catch(e){resultEl.innerHTML=`<div class="alert alert-error">❌ ${e.message}</div>`;}
  finally{loading(false);setTimeout(()=>{resultEl.innerHTML="";},4000);}
}

// ─── DB ───
async function loadAll(){const res=await callGas({action:"loadAll",token});if(res.ok){allRows=res.rows||[];renderMonthSelects();}}
function getMonths(){const s=new Set();allRows.forEach(r=>{const d=r["日付"];if(d)s.add(d.slice(0,7));});return[...s].sort().reverse();}
function getYears(){const s=new Set();allRows.forEach(r=>{const d=r["日付"];if(d)s.add(d.slice(0,4));});return[...s].sort().reverse();}
function renderMonthSelects(){
  const months=getMonths();const latest=months[0]||"";
  document.getElementById("db-month-sel").innerHTML=months.map(m=>`<option value="${m}"${m===latest?" selected":""}>${m}</option>`).join("");
  renderDbTable();
}
function renderDbTable(){
  const month=document.getElementById("db-month-sel").value;
  const rows=allRows.filter(r=>(r["日付"]||"").startsWith(month+"-")).sort((a,b)=>a["日付"]>b["日付"]?1:-1);
  document.getElementById("db-count").textContent=`${rows.length} 行`;
  const wrap=document.getElementById("db-table-wrap");
  if(!rows.length){wrap.innerHTML='<p style="color:var(--text2);font-size:.83rem;padding:6px 0">データがありません</p>';return;}
  const cols=["日付","合計売上","合計h","frex h","fresh h","合計時給","5h+","警告","メモ",...CLIENT_COLS];
  let html='<div class="table-wrap"><table><thead><tr><th class="cb-cell">☑</th>';
  cols.forEach(c=>html+=`<th>${c}</th>`);html+="</tr></thead><tbody>";
  rows.forEach((r,i)=>{html+=`<tr><td class="cb-cell"><input type="checkbox" data-idx="${i}" onchange="onCheckRow()" /></td>`;cols.forEach(c=>html+=`<td>${r[c]||""}</td>`);html+="</tr>";});
  html+="</tbody></table></div>";wrap.innerHTML=html;wrap._rows=rows;
  document.getElementById("del-card").style.display="none";
}
function onCheckRow(){
  const month=document.getElementById("db-month-sel").value;
  const rows=allRows.filter(r=>(r["日付"]||"").startsWith(month+"-")).sort((a,b)=>a["日付"]>b["日付"]?1:-1);
  const picked=[...document.querySelectorAll("#db-table-wrap input[type=checkbox]:checked")].map(cb=>rows[parseInt(cb.dataset.idx)]);
  const card=document.getElementById("del-card");
  if(!picked.length){card.style.display="none";return;}
  card.style.display="block";
  const cols=["日付","合計売上","合計h","メモ"];
  let html='<div class="table-wrap"><table><thead><tr>';cols.forEach(c=>html+=`<th>${c}</th>`);html+="</tr></thead><tbody>";
  picked.forEach(r=>{html+="<tr>";cols.forEach(c=>html+=`<td>${r[c]||""}</td>`);html+="</tr>";});
  html+="</tbody></table></div>";
  document.getElementById("del-preview").innerHTML=html;
  document.getElementById("del-preview")._picked=picked;
  document.getElementById("confirm-del").checked=false;
}
async function deleteChecked(){
  const prev=document.getElementById("del-preview");const picked=prev._picked||[];
  if(!picked.length)return;
  if(!document.getElementById("confirm-del").checked){
    document.getElementById("del-result").innerHTML='<div class="alert alert-warn">チェックを入れてから押してね</div>';return;
  }
  const keys=picked.map(r=>r["日付"]);loading(true);
  try{
    const res=await callGas({action:"deleteRows",token,dateKeys:keys});
    if(res.ok){document.getElementById("del-result").innerHTML=`<div class="alert alert-success">✅ 削除: ${keys.join(", ")}</div>`;await loadAll();renderDbTable();}
    else{document.getElementById("del-result").innerHTML=`<div class="alert alert-error">❌ ${res.error}</div>`;}
  }catch(e){document.getElementById("del-result").innerHTML=`<div class="alert alert-error">❌ ${e.message}</div>`;}
  finally{loading(false);}
}
function rowsToCsv(rows){
  const header=COLUMNS.join(",");
  const body=rows.map(r=>COLUMNS.map(c=>{const v=String(r[c]||"");return v.includes(",")||v.includes('"')?`"${v.replace(/"/g,'""')}"`:v;}).join(",")).join("\n");
  return"\uFEFF"+header+"\n"+body;
}
function downloadCsv(content,filename){const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(content);a.download=filename;a.click();}
function downloadCsvMonth(){const month=document.getElementById("db-month-sel").value;const rows=allRows.filter(r=>(r["日付"]||"").startsWith(month+"-")).sort((a,b)=>a["日付"]>b["日付"]?1:-1);downloadCsv(rowsToCsv(rows),`monthly_${month}.csv`);}
function downloadCsvAll(){const d=new Date().toISOString().slice(0,10);downloadCsv(rowsToCsv(allRows),`monthly_all_${d}.csv`);}

// ─── インポート ───
let importDf=null;
function onFileSelect(e){handleFile(e.target.files[0]);}
function onFileDrop(e){e.preventDefault();document.getElementById("file-drop").classList.remove("drag");handleFile(e.dataTransfer.files[0]);}
function handleFile(file){if(!file)return;const reader=new FileReader();reader.onload=ev=>parseImportCsv(ev.target.result);reader.readAsText(file,"UTF-8");}
function parseImportCsv(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.split(/\r?\n/);
  const header=lines[0].split(",").map(s=>s.trim().replace(/^"|"$/g,""));
  if(!header.includes("日付")){document.getElementById("import-preview").innerHTML='<div class="alert alert-error">CSVに「日付」列がありません</div>';return;}
  const rows=[];
  for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const vals=parseCsvLine(lines[i]);const row={};header.forEach((h,idx)=>{row[h]=vals[idx]||"";});COLUMNS.forEach(c=>{if(!(c in row))row[c]="";});rows.push(row);}
  importDf=rows;
  const dates=rows.map(r=>r["日付"]).filter(Boolean).sort();
  const months=[...new Set(dates.map(d=>d.slice(0,7)))].sort();
  const minD=dates[0]||"-",maxD=dates[dates.length-1]||"-";
  const pc=["日付","合計売上","合計h","frex h","fresh h","メモ"];
  let html=`<div class="alert alert-info">月=${months.join(", ")} / ${rows.length}行 / ${minD}〜${maxD}</div>`;
  html+=`<p style="font-size:.8rem;color:var(--text2);margin-bottom:8px">プレビュー（先頭10行）</p><div class="table-wrap" style="margin-bottom:14px"><table><thead><tr>`;
  pc.forEach(c=>html+=`<th>${c}</th>`);html+="</tr></thead><tbody>";
  rows.slice(0,10).forEach(r=>{html+="<tr>";pc.forEach(c=>html+=`<td>${r[c]||""}</td>`);html+="</tr>";});
  html+=`</tbody></table></div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:12px"><input type="checkbox" id="strict-month" style="width:20px;height:20px" /><span style="font-size:.86rem;line-height:1.4">（月次CSV向け）この月のDBを先に全削除してから復元</span></label>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:14px"><input type="checkbox" id="confirm-import" style="width:20px;height:20px" /><span style="font-size:.86rem">インポートしてOK（上書きあり）</span></label>
    <div id="import-result"></div>
    <button class="btn btn-primary" onclick="doImport()">📥 CSVをDBへインポート</button>`;
  document.getElementById("import-preview").innerHTML=html;
  document.getElementById("import-preview")._months=months;
}
function parseCsvLine(line){const res=[];let cur="",inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===","&&!inQ){res.push(cur);cur="";}else cur+=ch;}res.push(cur);return res;}
async function doImport(){
  if(!importDf||!importDf.length){document.getElementById("import-result").innerHTML='<div class="alert alert-error">ファイルを先に選択してください</div>';return;}
  if(!document.getElementById("confirm-import").checked){document.getElementById("import-result").innerHTML='<div class="alert alert-warn">チェックを入れてから押してね</div>';return;}
  const strictMonth=document.getElementById("strict-month").checked;
  const months=document.getElementById("import-preview")._months||[];
  if(strictMonth&&months.length!==1){document.getElementById("import-result").innerHTML='<div class="alert alert-error">月削除は1ヶ月分のCSV専用です</div>';return;}
  loading(true);
  try{
    const res=await callGas({action:"importCsv",token,rows:importDf,strictMonth,monthPrefix:months[0]||""});
    if(res.ok){document.getElementById("import-result").innerHTML=`<div class="alert alert-success">✅ ${res.count}行インポート完了</div>`;importDf=null;document.getElementById("import-preview").innerHTML="";document.getElementById("csv-file").value="";await loadAll();}
    else{document.getElementById("import-result").innerHTML=`<div class="alert alert-error">❌ ${res.error}</div>`;}
  }catch(e){document.getElementById("import-result").innerHTML=`<div class="alert alert-error">❌ ${e.message}</div>`;}
  finally{loading(false);}
}

// ─── レポート ───
function renderReportSelects(){
  const months=getMonths();const years=getYears();const now=new Date();
  const curM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const curY=String(now.getFullYear());
  document.getElementById("rep-month-sel").innerHTML=months.map(m=>`<option value="${m}"${m===curM?" selected":""}>${m}</option>`).join("");
  document.getElementById("rep-year-sel").innerHTML=years.map(y=>`<option value="${y}"${y===curY?" selected":""}>${y}</option>`).join("");
}
async function genMonthReport(){
  const monthStr=document.getElementById("rep-month-sel").value;
  if(!monthStr)return;loading(true);
  try{const res=await callGas({action:"reportMonth",token,monthStr});if(res.ok)showReport(res.text,res.pace);}
  catch(e){alert(e.message);}finally{loading(false);}
}
async function genYearReport(){
  const year=document.getElementById("rep-year-sel").value;
  if(!year)return;loading(true);
  try{const res=await callGas({action:"reportYear",token,year:parseInt(year)});if(res.ok)showReport(res.text,null);}
  catch(e){alert(e.message);}finally{loading(false);}
}
function showReport(text,pace){
  const pbw=document.getElementById("pace-badge-wrap");pbw.innerHTML="";
  if(pace&&pace.show){
    const sign=pace.diff>=0?"+":"";
    pbw.innerHTML=`<div class="pace-badge ${pace.ok?"pace-ok":"pace-ng"}">${pace.ok?"⭕️":"❌"} 理想累計 ${fmtComma(pace.idealCum)}円 / 実績 ${fmtComma(pace.actual)}円 / 差分 ${sign}${fmtComma(pace.diff)}円</div>`;
  }
  document.getElementById("report-text").textContent=text;
  document.getElementById("report-output").style.display="block";
  setTimeout(()=>document.getElementById("report-output").scrollIntoView({behavior:"smooth",block:"start"}),100);
}
function copyReport(){navigator.clipboard.writeText(document.getElementById("report-text").textContent).then(()=>alert("コピーしました"));}
</script>
</body>
