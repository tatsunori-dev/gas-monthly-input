<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tatsunori-dev/gas-monthly-input/main/icons/line_input.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE登録フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #5b8af0;
      --accent2: #7c6af5;
      --green: #34c77b;
      --red: #f05b5b;
      --text: #e2e6f3;
      --text2: #8892b0;
      --sans: 'Noto Sans JP', sans-serif;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 20px;
    }

    html, body {
      height: 100vh;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      margin: 0;
    }

    .card {
      background: var(--surface);
      border: none;
      border-radius: 0;
      padding: 28px 20px 24px;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 52px !important;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 36px !important;
      color: var(--text2);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 40px !important;
      color: var(--text2);
      margin-bottom: 12px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 24px;
      font-size: 40px !important;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--sans);
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    .field { margin-bottom: 14px; }

    .field.field-grow {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .field.field-grow label {
      flex-shrink: 0;
    }

    textarea {
      resize: none;
      line-height: 1.6;
      flex: 1;
      height: 100%;
      min-height: 200px;
    }

    button {
      width: 100%;
      padding: 28px 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 44px !important;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--sans);
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    button:hover { opacity: 0.88; transform: translateY(-1px); }
    button:active { transform: scale(0.98); }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    #result.success {
      background: rgba(52,199,123,0.12);
      color: var(--green);
      border: 1px solid rgba(52,199,123,0.35);
      display: block;
    }

    #result.error {
      background: rgba(240,91,91,0.12);
      color: var(--red);
      border: 1px solid rgba(240,91,91,0.35);
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="card-title">LINE登録フォーム</p>
    <p class="subtitle">Supabaseにメッセージを登録します</p>

    <div class="field">
      <label for="sender_name">送信者名</label>
      <input type="text" id="sender_name" name="sender_name" value="しょんぴぃ" placeholder="しょんぴぃ" />
    </div>

    <div class="field field-grow">
      <label for="content">メッセージ内容</label>
      <textarea id="content" name="content" placeholder="ここにLINEのメッセージを貼り付けてください"></textarea>
    </div>

    <button id="submit-btn" onclick="submitForm()">登録する</button>

    <div id="result"></div>
  </div>

  <script>
    function submitForm() {
      var senderName = document.getElementById('sender_name').value.trim();
      var content    = document.getElementById('content').value.trim();
      var resultEl   = document.getElementById('result');
      var btn        = document.getElementById('submit-btn');

      resultEl.className = '';
      resultEl.style.display = 'none';
      resultEl.textContent = '';

      if (!content) {
        resultEl.className = 'error';
        resultEl.textContent = 'メッセージを入力してください。';
        return;
      }

      btn.disabled = true;
      btn.textContent = '送信中...';

      function onSuccess(result) {
        resultEl.className = 'success';
        resultEl.textContent = '登録しました！';
        document.getElementById('content').value = '';
        btn.disabled = false;
        btn.textContent = '登録する';
      }

      function onError(err) {
        resultEl.className = 'error';
        resultEl.textContent = 'エラー: ' + (err.message || String(err));
        btn.disabled = false;
        btn.textContent = '登録する';
      }

      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onError)
        .submitMessage(senderName || 'しょんぴぃ', content);
    }
  </script>
</body>
</html>
