<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tatsunori-dev/gas-monthly-input/main/icons/delivery_app.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tatsunori-dev/gas-monthly-input/main/icons/delivery_app.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TEMC配達">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="配達">
<title>TEMC 配達</title>
<style>
:root {
  --primary: #2563eb;
  --green:   #10b981;
  --red:     #ef4444;
  --pink:    #ec4899;
  --cyan:    #06b6d4;
  --bg:      #f1f5f9;
  --card:    #ffffff;
  --border:  #e2e8f0;
  --text1:   #1e293b;
  --text2:   #64748b;
  --text3:   #cbd5e1;
  --header-h: 52px;
  --tab-h:    52px;
  --sheet-min: 180px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg);
  font-family: -apple-system, "Helvetica Neue", sans-serif; color: var(--text1); }

/* ─── ローディング ─── */
#loading-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.35); align-items: center; justify-content: center;
}
#loading-overlay.show { display: flex; }
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── ログイン ─── */
#login-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 32px 24px;
}
.login-logo { font-size: 2.4rem; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
.login-sub  { font-size: .9rem; color: var(--text2); margin-bottom: 36px; }
.login-box  { width: 100%; max-width: 340px; }
.login-box input {
  width: 100%; padding: 16px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 1rem; margin-bottom: 12px; outline: none; background: #fff;
}
.login-box input:focus { border-color: var(--primary); }
.btn-login {
  width: 100%; padding: 16px; background: var(--primary); color: #fff;
  border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer;
}
.login-err { color: var(--red); font-size: .85rem; text-align: center; margin-top: 10px; min-height: 20px; }

/* ─── メインレイアウト ─── */
#main-screen { display: none; flex-direction: column; height: 100vh; }

/* ─── ヘッダー（1行） ─── */
.header {
  background: var(--primary); color: #fff;
  height: var(--header-h); display: flex; align-items: center; padding: 0 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2); flex-shrink: 0;
}
.header-top { display: flex; align-items: center; width: 100%; gap: 8px; }
.btn-hamburger {
  background: none; border: none; color: #fff; font-size: 1.2rem;
  padding: 8px 6px; cursor: pointer; line-height: 1; flex-shrink: 0;
}
.header-title { font-size: 1.05rem; font-weight: 800; flex: 1; }
.summary-pill {
  background: rgba(255,255,255,.25); border-radius: 20px;
  padding: 4px 12px; font-size: .82rem; font-weight: 700;
}
.btn-refresh {
  background: rgba(255,255,255,.2); border: none; border-radius: 8px;
  color: #fff; padding: 7px 11px; font-size: .85rem; cursor: pointer;
}

/* ─── 日付パネル（ドロップダウン） ─── */
#date-panel {
  position: fixed; top: var(--header-h); left: 0; right: 0;
  background: var(--primary); z-index: 500;
  display: flex; align-items: center; gap: 8px; padding: 8px 12px 12px;
  transform: translateY(-110%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 6px 16px rgba(0,0,0,.25);
}
#date-panel.open { transform: translateY(0); }
#date-overlay {
  display: none; position: fixed; inset: 0; z-index: 490;
}
#date-overlay.open { display: block; }
.btn-date {
  background: rgba(255,255,255,.2); border: none; border-radius: 8px;
  color: #fff; width: 38px; height: 34px; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.date-label { font-size: .95rem; font-weight: 700; flex: 1; text-align: center; color: #fff; }
.btn-today {
  background: rgba(255,255,255,.25); border: none; border-radius: 8px;
  color: #fff; padding: 5px 10px; font-size: .8rem; font-weight: 700; cursor: pointer;
}

/* ─── タブ ─── */
.tab-bar {
  display: flex; background: #fff; border-bottom: 1px solid var(--border);
  flex-shrink: 0; height: var(--tab-h);
}
.tab-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  border: none; background: none; font-size: .88rem; font-weight: 600; color: var(--text2);
  cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-icon { font-size: 1.2rem; }

/* ─── パネル ─── */
.panel { flex: 1; overflow: hidden; position: relative; display: none; }
.panel.active { display: block; }

/* ─── リストパネル ─── */
#list-panel { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.list-inner { padding: 10px 12px 120px; }
.d-item {
  background: var(--card); border-radius: 12px; margin-bottom: 10px;
  border: 1.5px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.08);
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  cursor: pointer; transition: background .1s;
}
.d-item:active { background: var(--bg); }
.d-num {
  width: 34px; height: 34px; border-radius: 50%; background: var(--primary);
  color: #fff; font-weight: 800; font-size: .9rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.d-num.picked { background: #f59e0b; }
.d-num.done   { background: var(--text3); }
.d-item-main { flex: 1; min-width: 0; }
.d-item-time { font-size: .78rem; color: var(--text2); margin-bottom: 2px; }
.d-item-addr { font-size: .92rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-item-sub  { font-size: .76rem; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge {
  display: inline-block; border-radius: 6px; padding: 2px 7px;
  font-size: .7rem; font-weight: 700; color: #fff;
}
.badge-hp     { background: var(--red); }
.badge-line   { background: var(--pink); }
.badge-hako   { background: var(--cyan); }
.badge-manual { background: #7c3aed; }
.d-chevron  { color: var(--text3); font-size: .8rem; }
.empty-msg  { text-align: center; color: var(--text2); padding: 60px 24px; line-height: 1.8; }

/* ─── マップパネル ─── */
#map-panel { position: relative; }
#map { width: 100%; height: 100%; }
#map { background: #e8ecef; }
#geocode-status {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.7); color: #fff; font-size: .8rem; font-weight: 600;
  padding: 6px 14px; border-radius: 20px; z-index: 999; pointer-events: none;
  display: none;
}

/* ─── ボトムシート ─── */
#bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
  background: #fff; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,.18);
  transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.28,1);
  max-height: 92vh; display: flex; flex-direction: column;
}
#bottom-sheet.show   { transform: translateY(calc(100% - var(--sheet-min))); }
#bottom-sheet.expand { transform: translateY(0); }
.sheet-handle-wrap {
  padding: 10px 0 6px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: grab;
}
.sheet-handle { width: 40px; height: 5px; border-radius: 3px; background: var(--border); }
.sheet-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 40px; }

/* ─── ボトムシート内容 ─── */
.sheet-header { margin-bottom: 14px; }
.sheet-num-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; background: var(--primary); color: #fff;
  border-radius: 50%; font-weight: 800; font-size: .9rem; margin-right: 8px;
}
.sheet-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.sheet-time  { font-size: .85rem; color: var(--text2); }
.addr-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
.addr-label { font-size: .72rem; color: var(--text2); background: var(--bg); border-radius: 4px; padding: 2px 6px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
.addr-text { font-size: .92rem; font-weight: 600; flex: 1; line-height: 1.5; }
.btn-gmap {
  flex-shrink: 0; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; padding: 6px 10px; font-size: .78rem;
  font-weight: 700; cursor: pointer; white-space: nowrap;
}
.info-grid { display: grid; grid-template-columns: 60px 1fr; gap: 6px 8px; margin-bottom: 14px; font-size: .86rem; }
.info-key   { color: var(--text2); }
.info-val   { font-weight: 500; }
.sheet-divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ─── アクション起動ボタン（シート下部） ─── */
.btn-open-action {
  display: block; width: 100%; margin-top: 16px;
  background: var(--primary); color: #fff; border: none; border-radius: 14px;
  padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer;
  letter-spacing: .04em;
}
/* ─── 電話発信リンク ─── */
.sheet-tel {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  background: #f0fdf4; border-radius: 10px; padding: 10px 14px;
  color: #16a34a; font-weight: 700; font-size: .95rem; text-decoration: none;
}

/* ─── タブバーをアクションページの上に固定 ─── */
.tab-bar { position: relative; z-index: 400; }
.header  { position: relative; z-index: 400; }

/* ─── アクションページ（別ページ・スライドイン、ヘッダー+タブの下から） ─── */
#action-page {
  position: fixed;
  top: calc(var(--header-h) + var(--tab-h));
  left: 0; right: 0; bottom: 0;
  background: #f8fafc; z-index: 300;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#action-page.show { transform: translateX(0); }
.action-page-header {
  padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 8px;
}
.btn-action-back {
  background: none; border: none; padding: 4px 8px; font-size: .95rem;
  color: var(--primary); font-weight: 700; cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.action-page-title { font-weight: 800; font-size: 1rem; flex: 1; text-align: center; }
.action-page-body { padding: 20px 16px 48px; }
.action-section-label {
  font-size: .75rem; font-weight: 700; color: var(--text3);
  letter-spacing: .05em; margin: 20px 0 8px;
}
.btn-map-action {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 14px 16px; font-size: .95rem; font-weight: 600; cursor: pointer; margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
}
.btn-pin-action {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: none; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 14px 16px; font-size: .95rem; color: var(--text2); cursor: pointer; margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
}

/* ─── ピン編集ボタン（後方互換） ─── */
.btn-pin-edit { display: none; }
.pin-edit-hint { display: none; }

/* ─── スワイプで完了 ─── */
.swipe-wrap { position: relative; border-radius: 14px; overflow: hidden; height: 60px; margin-top: 8px; user-select: none; }
.swipe-bg   { position: absolute; inset: 0; background: var(--green); display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; font-weight: 700; color: #fff; }
.swipe-track {
  position: absolute; inset: 0; background: #e2e8f0;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; font-weight: 700; color: var(--text2);
  border-radius: 14px; touch-action: pan-y;
}
.swipe-track.done { background: var(--green); color: #fff; pointer-events: none; }

/* ─── ピン編集クロスヘア ─── */
#pin-crosshair {
  display: none; position: fixed; inset: 0; z-index: 1200; pointer-events: none;
}
#pin-crosshair.active { display: block; }
.crosshair-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
}
#pin-confirm-btn {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #fff; border: none; border-radius: 28px;
  padding: 14px 36px; font-size: 1rem; font-weight: 700;
  box-shadow: 0 4px 16px rgba(0,0,0,.3); pointer-events: all; cursor: pointer;
}
#pin-cancel-btn {
  position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
  background: none; color: var(--text2); border: none; font-size: .85rem;
  pointer-events: all; cursor: pointer; text-decoration: underline;
}
#pin-search-bar {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: flex; gap: 6px; pointer-events: all;
}
#pin-search-input {
  flex: 1; padding: 10px 14px; border-radius: 10px; border: none;
  font-size: .92rem; box-shadow: 0 2px 8px rgba(0,0,0,.2); outline: none;
}
#pin-search-btn {
  background: var(--primary); color: #fff; border: none; border-radius: 10px;
  padding: 10px 14px; font-size: 1rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

/* ─── 削除ボタン ─── */
.btn-delete-item {
  background: none; border: none; color: var(--text3); font-size: 1.2rem;
  padding: 4px 8px; cursor: pointer; flex-shrink: 0;
}
.btn-delete-item:active { color: var(--red); }

/* ─── マップ上のピン番号スタイル ─── */
/* SVGピンを使うためCSSは最小限 */
.map-pin-svg { filter: drop-shadow(0 3px 6px rgba(0,0,0,.45)); }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-logo">TEMC</div>
  <div class="login-sub">配達アプリ</div>
  <div class="login-box">
    <input type="text"     id="lUser" placeholder="ユーザー名" autocomplete="username" autocapitalize="off">
    <input type="password" id="lPass" placeholder="パスワード" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen">
  <!-- ヘッダー（1行） -->
  <div class="header">
    <div class="header-top">
      <button class="btn-hamburger" onclick="toggleDatePanel()">☰</button>
      <div class="header-title">📦 配達</div>
      <span class="summary-pill" id="summaryPill">0件</span>
      <button class="btn-refresh" onclick="loadDeliveries()">↺</button>
    </div>
  </div>

  <!-- 日付パネル（ドロップダウン） -->
  <div id="date-overlay" onclick="closeDatePanel()"></div>
  <div id="date-panel">
    <button class="btn-date" onclick="changeDate(-1)">‹</button>
    <div class="date-label" id="dateLabel"></div>
    <button class="btn-date" onclick="changeDate(1)">›</button>
    <button class="btn-today" onclick="goToday(); closeDatePanel()">今日</button>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-list" onclick="switchTab('list')">
      <span class="tab-icon">☰</span> リスト
    </button>
    <button class="tab-btn" id="tab-map" onclick="switchTab('map')">
      <span class="tab-icon">🗺</span> マップ
    </button>
  </div>

  <!-- リストパネル -->
  <div class="panel active" id="list-panel">
    <div class="list-inner" id="list-inner">
      <div class="empty-msg">読み込み中...</div>
    </div>
  </div>

  <!-- マップパネル -->
  <div class="panel" id="map-panel">
    <div id="map"></div>
    <div id="geocode-status">📍 ピンを読み込み中...</div>
    <!-- ピン位置編集クロスヘア -->
    <div id="pin-crosshair">
      <div id="pin-search-bar">
        <input id="pin-search-input" type="text" placeholder="住所を検索して近くに移動..."
               onkeydown="if(event.key==='Enter'){searchPinLocation();}">
        <button id="pin-search-btn" ontouchend="event.preventDefault();event.stopPropagation();searchPinLocation();" onclick="searchPinLocation()">🔍</button>
      </div>
      <div class="crosshair-center">
        <svg width="48" height="60" viewBox="0 0 48 60" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
          <circle cx="24" cy="20" r="18" fill="#ef4444" stroke="#fff" stroke-width="3"/>
          <polygon points="24,58 13,34 35,34" fill="#ef4444"/>
          <line x1="24" y1="0" x2="24" y2="4" stroke="#ef4444" stroke-width="2"/>
          <line x1="24" y1="36" x2="24" y2="40" stroke="#ef4444" stroke-width="2"/>
          <line x1="4"  y1="20" x2="8"  y2="20" stroke="#ef4444" stroke-width="2"/>
          <line x1="40" y1="20" x2="44" y2="20" stroke="#ef4444" stroke-width="2"/>
        </svg>
      </div>
      <button id="pin-confirm-btn" ontouchend="event.preventDefault();event.stopPropagation();confirmPinFromCrosshair();" onclick="confirmPinFromCrosshair()">📍 ここに設定</button>
      <button id="pin-cancel-btn"  ontouchend="event.preventDefault();event.stopPropagation();cancelPinEdit();" onclick="cancelPinEdit()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ボトムシート -->
<div id="bottom-sheet">
  <div class="sheet-handle-wrap" id="sheet-handle">
    <div class="sheet-handle"></div>
  </div>
  <div class="sheet-scroll" id="sheet-content"></div>
</div>

<!-- アクションページ -->
<div id="action-page">
  <div class="action-page-header">
    <button class="btn-action-back" ontouchend="event.preventDefault(); closeActionPage();" onclick="closeActionPage()">‹ 戻る</button>
    <span class="action-page-title" id="action-page-title"></span>
  </div>
  <div class="action-page-body">
    <div class="action-section-label">ステータス</div>
    <div id="action-page-swipe"></div>
    <div class="action-section-label">ナビゲーション</div>
    <button class="btn-map-action" id="apage-map-pickup">🗺 集荷先をマップで開く</button>
    <button class="btn-map-action" id="apage-map-delivery">🗺 配達先をマップで開く</button>
    <div class="action-section-label">その他</div>
    <button class="btn-pin-action" id="apage-pin-edit">📍 ピン位置を修正</button>
  </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=<?!= mapsApiKey ?>&language=ja&region=JP" async></script>
<script>
// ══════════════════════════════════════
// 状態
// ══════════════════════════════════════
var token       = "";
var targetDate  = "";
var deliveries  = [];   // {id, type:"cr"|"ow", data:{}, num, done, lat, lng}
var selectedIdx = -1;
var googleMap   = null;
var markers     = [];
var locMarker   = null;
var geocodeCache = {};  // id -> {lat, lng, edited}
var pinEditMode  = false;
var currentTab   = "list";

// ボトムシートドラッグ用
var sheetDragStart   = 0;
var sheetExpanded    = false;
var sheetDragEnabled = true; // ボタンタップ中はfalse（ドラッグ無効）

// ピン編集中のアイテム（closeSheetがselectedIdxをリセットするため別変数で保持）
var pinEditItem = null;

// スワイプ完了用
var swipeDragStartX = 0;
var swipeDragging   = false;

// ══════════════════════════════════════
// 初期化
// ══════════════════════════════════════
window.addEventListener("DOMContentLoaded", function() {
  // localStorage から読み込み（使えれば即時）
  try {
    var saved     = localStorage.getItem("delivery_token");
    var savedTime = localStorage.getItem("delivery_token_time");
    if (saved && savedTime && (Date.now() - parseInt(savedTime, 10)) < 12 * 3600 * 1000) {
      token = saved;
    }
  } catch(e) { /* localStorage blocked */ }
  targetDate = todayStr();
  if (token) { showMain(); loadDeliveries(); return; }
  // localStorage になければサーバー側の保存トークンを確認（iOS ホーム画面ショートカット対応）
  loading(true);
  callGas({ action: "getAutoToken" }).then(function(res) {
    loading(false);
    if (res && res.ok) {
      token = res.token;
      try { localStorage.setItem("delivery_token", token); localStorage.setItem("delivery_token_time", Date.now().toString()); } catch(e) {}
      showMain(); loadDeliveries();
    }
    // ok でなければログイン画面のまま
  }).catch(function() { loading(false); /* ログイン画面のまま */ });

  // ボトムシート全体でドラッグ対応
  var sheet = document.getElementById("bottom-sheet");
  sheet.addEventListener("touchstart", onSheetTouchStart, { passive: true });
  sheet.addEventListener("touchmove",  onSheetTouchMove,  { passive: false });
  sheet.addEventListener("touchend",   onSheetTouchEnd,   { passive: true });

  // シート外タップで閉じる
  document.addEventListener("click", function(e) {
    var sheet = document.getElementById("bottom-sheet");
    if (!sheet.contains(e.target) && !e.target.closest(".d-item") && !e.target.closest(".map-pin")) {
      closeSheet();
    }
  });
});

// ══════════════════════════════════════
// GAS呼び出し
// ══════════════════════════════════════
function callGas(payload) {
  return new Promise(function(resolve, reject) {
    if (typeof google === "undefined" || !google.script || !google.script.run) {
      reject(new Error("google.script.run unavailable")); return;
    }
    google.script.run
      .withSuccessHandler(function(r) { resolve(r); })
      .withFailureHandler(function(e) { reject(e); })
      .dispatch(payload.action, payload);
  });
}

function doLogin() {

  if (!u || !p) { document.getElementById("login-err").textContent = "入力してください"; return; }

  }).catch(function(e) {

// ══════════════════════════════════════
// 日付操作
// ══════════════════════════════════════
function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" +
    ("0" + (d.getMonth()+1)).slice(-2) + "-" +
    ("0" + d.getDate()).slice(-2);
}
function formatDateLabel(s) {
  var d    = new Date(s + "T00:00:00+09:00");
  var days = ["日","月","火","水","木","金","土"];
  return (d.getMonth()+1) + "/" + d.getDate() + " (" + days[d.getDay()] + ")" + (s === todayStr() ? " 今日" : "");
}
function changeDate(delta) {
  var d = new Date(targetDate + "T00:00:00+09:00");
  d.setDate(d.getDate() + delta);
  targetDate = d.getFullYear() + "-" + ("0"+(d.getMonth()+1)).slice(-2) + "-" + ("0"+d.getDate()).slice(-2);
  loadDeliveries();
}
function goToday() { targetDate = todayStr(); loadDeliveries(); }

// ══════════════════════════════════════
// データ取得
// ══════════════════════════════════════
function loadDeliveries() {
  document.getElementById("dateLabel").textContent = formatDateLabel(targetDate);
  closeSheet();
  loading(true);
  callGas({ action: "getDeliveries", token: token, date: targetDate }).then(function(res) {
    loading(false);
    if (res.error === "unauthorized") { try { localStorage.removeItem("delivery_token"); localStorage.removeItem("delivery_token_time"); } catch(e) {} location.reload(); return; }
    if (!res.ok) { showListMsg("エラー: " + esc(res.error || "不明")); return; }
    buildDeliveries(res.cr || [], res.ow || []);
  }).catch(function(e) {
    loading(false);
    showListMsg("エラー: " + esc(e && e.message ? e.message : String(e)));
  });
}

function buildDeliveries(crRows, owRows) {
  var items = [];
  crRows.forEach(function(r) {
    items.push({ type:"cr", data:r, sortKey: r.desired_datetime || "9999", done: r.status === "配達完了" });
  });
  owRows.forEach(function(r) {
    var key = r.work_date + "T" + (r.pickup_time || "23:59") + ":00";
    items.push({ type:"ow", data:r, sortKey: key, done: r.status === "完了" });
  });
  items.sort(function(a,b) { return a.sortKey < b.sortKey ? -1 : 1; });
  items.forEach(function(item, i) { item.num = i + 1; item.id = item.data.id; });
  deliveries = items;

  document.getElementById("summaryPill").textContent = items.length + "件";
  renderList();
  if (currentTab === "map") { initMap(); geocodeAll(); }
  else { geocodeAll(); }
}

function renderList() {
  if (!deliveries.length) { showListMsg("この日の配達はありません"); return; }
  var html = deliveries.map(function(item) {
    var d      = item.type === "cr" ? item.data : null;
    var o      = item.type === "ow" ? item.data : null;
    var phase2 = getDeliveryPhase(item);
    var addr   = d
      ? (phase2 === "new" ? (d.pickup_address || "—") : (d.delivery_address || "—"))
      : (o.delivery_location || "—");
    var time   = d ? formatTime(d.desired_datetime) : (o.pickup_time ? o.pickup_time.slice(0,5) : "—");
    var name   = d ? (d.name || "") : "";
    var isLine   = d && ((d.contact_method === "LINE" && d.note && d.note.indexOf("[LINE経由]") >= 0) || (d.pickup_address && d.pickup_address.trim() === "澄川ピック"));
    var isManual = d && !isLine && ["phone","email","line"].indexOf((d.contact_method || "").toLowerCase()) < 0;
    var badge    = item.type === "ow" ? "badge-hako ハコベル" : isLine ? "badge-line しょんぴぃ" : isManual ? "badge-manual 手動" : "badge-hp HP";
    var numCls = phase2 === "done" ? " done" : phase2 === "picked" ? " picked" : "";
    return '<div class="d-item" onclick="openDetail(' + item.num + ')">' +
      '<div class="d-num' + numCls + '">' + item.num + '</div>' +
      '<div class="d-item-main">' +
        '<div class="d-item-time"><span class="badge ' + badge + '"></span> ' + esc(time) + '</div>' +
        '<div class="d-item-addr">' + esc(abbrev(addr, 22)) + '</div>' +
        (name ? '<div class="d-item-sub">' + esc(name) + '</div>' : '') +
      '</div>' +
      '<button class="btn-delete-item" onclick="event.stopPropagation();deleteItem(' + item.num + ')">🗑</button>' +
      '<div class="d-chevron">›</div>' +
    '</div>';
  }).join("");
  document.getElementById("list-inner").innerHTML = html;
}

function showListMsg(msg) {
  document.getElementById("list-inner").innerHTML = '<div class="empty-msg">' + msg + '</div>';
}

// ══════════════════════════════════════
// マップ初期化
// ══════════════════════════════════════
function initMap() {
  if (googleMap) { refreshMapPins(); return; }
  if (typeof google === "undefined" || !google.maps) {
    setTimeout(initMap, 200); return;
  }
  googleMap = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 43.0618, lng: 141.3545 },
    zoom: 12,
    gestureHandling: "greedy",
    mapTypeId: google.maps.MapTypeId.ROADMAP,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    zoomControl: true,
    clickableIcons: false
  });

  googleMap.addListener("click", function() { closeSheet(); });

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(function(pos) {
      var latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (!locMarker) {
        locMarker = new google.maps.Marker({
          position: latlng, map: googleMap, zIndex: 50,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10,
            fillColor: "#3b82f6", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 3 }
        });
        fitMapToPins(); // 現在地取得後に全体表示を再調整
      } else {
        locMarker.setPosition(latlng);
      }
    }, null, { enableHighAccuracy: true });
  }

  refreshMapPins();
}

function fitMapToPins() {
  if (!googleMap) return;
  var keys = Object.keys(geocodeCache);
  var hasLoc = locMarker && locMarker.getPosition();
  if (!keys.length && !hasLoc) return;

  var bounds = new google.maps.LatLngBounds();
  keys.forEach(function(k) { bounds.extend({ lat: geocodeCache[k].lat, lng: geocodeCache[k].lng }); });
  if (hasLoc) bounds.extend(locMarker.getPosition());

  var totalPts = keys.length + (hasLoc ? 1 : 0);
  if (totalPts === 1) {
    var center = keys.length ? { lat: geocodeCache[keys[0]].lat, lng: geocodeCache[keys[0]].lng } : locMarker.getPosition();
    googleMap.setCenter(center); googleMap.setZoom(16);
  } else {
    googleMap.fitBounds(bounds, 40);
    google.maps.event.addListenerOnce(googleMap, "bounds_changed", function() {
      if (googleMap.getZoom() > 16) googleMap.setZoom(16);
    });
  }
}

function refreshMapPins() {
  markers.forEach(function(m) { if (m) m.setMap(null); });
  markers = new Array(deliveries.length).fill(null);
  if (!googleMap) return;

  deliveries.forEach(function(item, i) {
    var phase  = getDeliveryPhase(item);
    if (phase === "done") return; // done はピン非表示
    var key = item.type + "-" + item.id;
    var geo = geocodeCache[key];
    if (!geo) return;

    var isSelected = (i === selectedIdx);
    var color  = isSelected ? "#16a34a" : phase === "picked" ? "#f59e0b" : "#2563eb";
    var size   = isSelected ? 52 : 44;
    var r      = size * 0.42;
    var cx     = size / 2;
    var circleY = size * 0.42;
    var svg = '<svg width="' + size + '" height="' + (size+10) + '" viewBox="0 0 ' + size + ' ' + (size+10) + '" xmlns="http://www.w3.org/2000/svg">' +
      '<circle cx="' + cx + '" cy="' + circleY + '" r="' + r + '" fill="' + color + '" stroke="#fff" stroke-width="3"/>' +
      '<polygon points="' + cx + ',' + (size+10) + ' ' + (cx-r*0.55) + ',' + (circleY+r*0.7) + ' ' + (cx+r*0.55) + ',' + (circleY+r*0.7) + '" fill="' + color + '"/>' +
      '<text x="' + cx + '" y="' + (circleY+5) + '" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-weight="900" font-size="' + Math.round(size*0.32) + '" font-family="-apple-system,sans-serif">' + item.num + '</text>' +
      '</svg>';
    var m = new google.maps.Marker({
      position: { lat: geo.lat, lng: geo.lng },
      map: googleMap, zIndex: isSelected ? 1000 : i,
      icon: {
        url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        scaledSize: new google.maps.Size(size, size + 10),
        anchor: new google.maps.Point(size / 2, size + 10)
      }
    });
    (function(num) { m.addListener("click", function() { openDetail(num); }); })(item.num);
    markers[i] = m;
  });
}

// ══════════════════════════════════════
// ジオコーディング（GASサーバー経由）
// ══════════════════════════════════════
// 住所クリーニング（括弧・階数・号室除去）
var ADDRESS_ALIAS = {
  "澄川ピック": "しょんぴぃケーキ　澄川"
};

function cleanAddress(addr) {
  var s = (addr || "").trim();
  if (ADDRESS_ALIAS[s]) return ADDRESS_ALIAS[s];
  return s
    .replace(/[（(【「][^）)】」]*[）)】」]/g, "")
    .replace(/[\s　]*\d+[Ff階].*/g, "")
    .replace(/[\s　]*\d+-\d+号室.*/g, "")
    .replace(/\s+/g, " ").trim();
}

function geocodeAll() {
  var toGeocode = [];
  var addrSeen  = {}; // 同住所の重複排除
  deliveries.forEach(function(item) {
    var key   = item.type + "-" + item.id;
    if (geocodeCache[key]) return;
    var phase = getDeliveryPhase(item);
    if (phase === "done") return; // done はピン非表示
    var raw = item.type === "cr"
      ? (phase === "new" ? (item.data.pickup_address || "") : (item.data.delivery_address || item.data.pickup_address || ""))
      : (phase === "new" ? (item.data.pickup_location || "") : (item.data.delivery_location || item.data.pickup_location || ""));
    var addr = cleanAddress(raw);
    if (!addr) return;
    // 同じ住所が既に処理済みならキャッシュをコピー
    if (addrSeen[addr]) { geocodeCache[key] = addrSeen[addr]; return; }
    toGeocode.push({ key: key, address: addr });
    addrSeen[addr] = null; // 後で上書き
  });

  if (!toGeocode.length) {
    if (googleMap) { refreshMapPins(); fitMapToPins(); }
    return;
  }

  var statusEl = document.getElementById("geocode-status");
  if (statusEl) { statusEl.style.display = "block"; statusEl.textContent = "📍 " + toGeocode.length + "件のピンを読み込み中..."; }

  // GAS Maps（Google）経由で一括ジオコーディング
  callGas({ action: "geocodeAll", token: token, addresses: toGeocode })
    .then(function(res) {
      if (res.ok && res.results) {
        Object.keys(res.results).forEach(function(k) {
          geocodeCache[k] = res.results[k];
        });
      }
      var pinCount = Object.keys(geocodeCache).length;
      if (statusEl) {
        statusEl.textContent = pinCount > 0 ? "📍 " + pinCount + "件" : "⚠ 住所を取得できませんでした";
        setTimeout(function() { statusEl.style.display = "none"; }, 3000);
      }
      if (googleMap) { refreshMapPins(); fitMapToPins(); }
    })
    .catch(function(e) {
      if (statusEl) { statusEl.textContent = "⚠ " + (e && e.message ? e.message : "エラー"); setTimeout(function() { statusEl.style.display = "none"; }, 4000); }
      if (googleMap) refreshMapPins();
    });
}

    '<div class="addr-row">' +
      '<span class="addr-label">配達</span>' +
      '<span class="addr-text">' + esc(delivery) + '</span>' +
    '</div>' +

      (cargo  ? '<span class="info-key">荷物</span><span class="info-val">' + esc(cargo) + '</span>' : '') +
      (amount ? '<span class="info-key">金額</span><span class="info-val">' + esc(amount) + '</span>' : '') +
      (memo   ? '<span class="info-key">備考</span><span class="info-val">' + esc(memo) + '</span>' : '') +

  }

// ══════════════════════════════════════
// ステータス判定
// ══════════════════════════════════════
function getDeliveryPhase(item) {
  var s = (item.data.status || "").trim();
  if (item.type === "cr") {
    if (s === "配達完了") return "done";
    if (s === "集荷中")   return "picked";
    return "new";
  } else {
    if (s === "完了")   return "done";
    if (s === "集荷中") return "picked";
    return "new";
  }
}

// ══════════════════════════════════════
// スワイプUI生成（2段階）
// ══════════════════════════════════════
function buildSwipe(phase, id, tableType) {
  if (phase === "done") {
    return '<div class="swipe-wrap"><div class="swipe-track done">✓ 配達完了済み</div></div>';
  }
  var label  = phase === "new" ? "→ スワイプして集荷完了" : "→ スワイプして配達完了";
  var bgText = phase === "new" ? "集荷完了 ✓" : "配達完了 ✓";
  var bgColor = phase === "new" ? "#f59e0b" : "var(--green)";
  return '<div class="swipe-wrap" id="swipe-wrap">' +
    '<div class="swipe-bg" style="background:' + bgColor + '">' + bgText + '</div>' +
    '<div class="swipe-track" id="swipe-track">' + label + '</div>' +
  '</div>';
}

function setupSwipe(id, tableType, phase) {
  setTimeout(function() {
    var track = document.getElementById("swipe-track");
    if (!track) return;
    track.addEventListener("touchstart", function(e) {
      swipeDragStartX = e.touches[0].clientX;
      swipeDragging   = true;
    }, { passive: true });
    track.addEventListener("touchmove", function(e) {
      if (!swipeDragging) return;
      var dx  = Math.max(0, e.touches[0].clientX - swipeDragStartX);
      var pct = Math.min(dx / track.offsetWidth, 1);
      track.style.transform = "translateX(" + (pct * 100) + "%)";
      track.style.opacity   = String(1 - pct * 0.6);
    }, { passive: true });
    track.addEventListener("touchend", function(e) {
      if (!swipeDragging) return;
      swipeDragging = false;
      var dx  = Math.max(0, e.changedTouches[0].clientX - swipeDragStartX);
      var pct = dx / track.offsetWidth;
      if (pct > 0.55) {
        if (phase === "new") {
          doPickupComplete(id, tableType);
        } else {
          doCompleteDelivery(id, tableType);
        }
      } else {
        track.style.transform = "";
        track.style.opacity   = "";
      }
    }, { passive: true });
  }, 100);
}

// ══════════════════════════════════════
// 集荷完了処理
// ══════════════════════════════════════
function doPickupComplete(id, tableType) {
  loading(true);
  callGas({ action: "pickupComplete", token: token, id: id, tableType: tableType }).then(function(res) {
    loading(false);
    if (res.ok) {
      var item = deliveries.find(function(d) { return d.id === id && d.type === tableType; });
      if (item) { item.data.status = "集荷中"; }
      // ジオコードキャッシュをクリアして配達先住所で再取得
      var cacheKey = tableType + "-" + id;
      delete geocodeCache[cacheKey];
      // アクションページ内スワイプを配達完了用に切り替え
      var swipeEl = document.getElementById("action-page-swipe");
      if (swipeEl) {
        swipeEl.innerHTML = buildSwipe("picked", id, tableType);
        setTimeout(function() { setupSwipe(id, tableType, "picked"); }, 0);
      }
      renderList();
      if (googleMap) geocodeAll();
    } else {
      alert("エラー: " + (res.error || "不明"));
      var track = document.getElementById("swipe-track");
      if (track) { track.style.transform = ""; track.style.opacity = ""; }
    }
  }).catch(function(e) {
    loading(false);
    alert("通信エラー: " + (e && e.message ? e.message : String(e)));
    var track = document.getElementById("swipe-track");
    if (track) { track.style.transform = ""; track.style.opacity = ""; }
  });
}

// ══════════════════════════════════════
// 配達完了処理
// ══════════════════════════════════════
function doCompleteDelivery(id, tableType) {
  loading(true);
  callGas({ action: "completeDelivery", token: token, id: id, tableType: tableType }).then(function(res) {
    loading(false);
    if (res.ok) {
      var item = deliveries.find(function(d) { return d.id === id && d.type === tableType; });
      if (item) { item.done = true; item.data.status = item.type === "cr" ? "配達完了" : "完了"; }
      closeActionPage();
      renderList();
      if (googleMap) refreshMapPins();
    } else {
      alert("エラー: " + (res.error || "不明"));
      var track = document.getElementById("swipe-track");
      if (track) { track.style.transform = ""; track.style.opacity = ""; }
    }
  }).catch(function(e) {
    loading(false);
    alert("通信エラー: " + (e && e.message ? e.message : String(e)));
    var track = document.getElementById("swipe-track");
    if (track) { track.style.transform = ""; track.style.opacity = ""; }
  });
}

// ══════════════════════════════════════
// ピン編集モード
// ══════════════════════════════════════
function togglePinEdit() {
  // closeSheetがselectedIdxをリセットする前にアイテムを保存
  pinEditItem = (selectedIdx >= 0) ? deliveries[selectedIdx] : null;
  pinEditMode = true;
  // ボトムシートをシートのみ非表示（selectedIdxはリセットしない）
  var sheet = document.getElementById("bottom-sheet");
  sheet.classList.remove("show", "expand");
  sheetExpanded = false;
  switchTab("map");
  document.getElementById("pin-crosshair").classList.add("active");
  // マップを現在のピン位置にフォーカス
  if (pinEditItem) {
    var geo = geocodeCache[pinEditItem.type + "-" + pinEditItem.id];
    if (geo) { googleMap.setCenter({ lat: geo.lat, lng: geo.lng }); googleMap.setZoom(Math.max(googleMap.getZoom(), 16)); }
  }
}

// ══════════════════════════════════════
// ボトムシートドラッグ
// ══════════════════════════════════════
function onSheetTouchStart(e) {
  // ボタン・リンクへのタップはドラッグを無効にする
  var t = e.target;
  var sheet = document.getElementById("bottom-sheet");
  while (t && t !== sheet) {
    if (t.tagName === "BUTTON" || t.tagName === "A" || t.tagName === "INPUT") {
      sheetDragEnabled = false;
      return;
    }
    t = t.parentElement;
  }
  sheetDragEnabled = true;
  sheetDragStart = e.touches[0].clientY;
  sheetDragScrollTop = document.getElementById("sheet-content").scrollTop;
}
function onSheetTouchMove(e) {
  if (!sheetDragEnabled) return; // ボタンタップ中はスキップ
  var dy = sheetDragStart - e.touches[0].clientY;
  var scrollEl = document.getElementById("sheet-content");
  // 展開中かつスクロール中は干渉しない
  if (sheetExpanded && scrollEl.scrollTop > 0) return;
  if (sheetExpanded && dy > 0) return;
  e.preventDefault();
}
function onSheetTouchEnd(e) {
  if (!sheetDragEnabled) { sheetDragEnabled = true; return; } // ボタンタップ後はリセット
  var dy = sheetDragStart - e.changedTouches[0].clientY;
  var sheet = document.getElementById("bottom-sheet");
  if (!sheetExpanded && dy > 30) {
    sheet.classList.add("expand"); sheetExpanded = true;
  } else if (sheetExpanded && document.getElementById("sheet-content").scrollTop <= 0 && dy < -40) {
    sheet.classList.remove("expand"); sheetExpanded = false;
  } else if (!sheetExpanded && dy < -60) {
    closeSheet();
  }
}

// ══════════════════════════════════════
// アクションページ（スライドイン別ページ）
// ══════════════════════════════════════
function openActionPage() {
  if (selectedIdx < 0) return;
  var item = deliveries[selectedIdx];
  var d    = item.type === "cr" ? item.data : null;
  var o    = item.type === "ow" ? item.data : null;
  var title    = d ? (d.name ? d.name + " 様" : "HP配送依頼") : "ハコベル";
  var pickup   = d ? (d.pickup_address  || "—") : (o.pickup_location  || "—");
  var delivery = d ? (d.delivery_address|| "—") : (o.delivery_location|| "—");
  var phase    = getDeliveryPhase(item);

  document.getElementById("action-page-title").textContent = title;

  // スワイプエリア
  var swipeEl = document.getElementById("action-page-swipe");
  swipeEl.innerHTML = buildSwipe(phase, item.id, item.type);
  if (phase !== "done") setTimeout(function() { setupSwipe(item.id, item.type, phase); }, 0);

  // マップボタン
  var btnPickup   = document.getElementById("apage-map-pickup");
  var btnDelivery = document.getElementById("apage-map-delivery");
  btnPickup.onclick   = function() { openGmap(pickup); };
  btnDelivery.onclick = function() { openGmap(delivery); };
  btnPickup.style.opacity   = pickup   === "—" ? ".4" : "1";
  btnDelivery.style.opacity = delivery === "—" ? ".4" : "1";

  // ピン編集ボタン（selectedIdxをcloseSheet前に保存してからtoggle）
  var capturedIdx = selectedIdx;
  document.getElementById("apage-pin-edit").onclick = function(e) {
    e.stopPropagation();
    closeActionPage();
    setTimeout(function() {
      selectedIdx = capturedIdx; // document clickで-1になっても復元
      togglePinEdit();
    }, 150);
  };

  document.getElementById("action-page").classList.add("show");
}

function closeActionPage() {
  document.getElementById("action-page").classList.remove("show");
}

// ── クロスヘア検索 ───────────────────────────────────────────
function searchPinLocation() {
  var q = (document.getElementById("pin-search-input").value || "").trim();
  if (!q) return;
  var btn = document.getElementById("pin-search-btn");
  btn.textContent = "…"; btn.disabled = true;
  callGas({ action: "searchAddress", token: token, query: q })
    .then(function(res) {
      btn.textContent = "🔍"; btn.disabled = false;
      if (res.ok && res.lat) {
        googleMap.setCenter({ lat: res.lat, lng: res.lng }); googleMap.setZoom(17);
      } else {
        alert("住所が見つかりませんでした: " + (res.formatted || q));
      }
    })
    .catch(function(e) {
      btn.textContent = "🔍"; btn.disabled = false;
      alert("検索エラー: " + (e && e.message ? e.message : String(e)));
    });
}

// ── クロスヘアでピン確定 ──────────────────────────────────────
function confirmPinFromCrosshair() {
  if (!googleMap || !pinEditItem) return;
  var center = googleMap.getCenter();
  geocodeCache[pinEditItem.type + "-" + pinEditItem.id] = { lat: center.lat(), lng: center.lng(), edited: true };
  pinEditItem = null;
  cancelPinEdit();
  refreshMapPins();
}
function cancelPinEdit() {
  pinEditMode = false;
  document.getElementById("pin-crosshair").classList.remove("active");
}

// ── 削除ボタン ────────────────────────────────────────────────
function deleteItem(num) {
  if (!confirm((num) + "番の案件をリストから削除しますか？")) return;
  var idx  = num - 1;
  var item = deliveries[idx];
  if (!item) return;
  loading(true);
  callGas({ action: "deleteItem", token: token, id: item.id, tableType: item.type })
    .then(function(res) {
      loading(false);
      deliveries.splice(idx, 1);
      // 番号を振り直す
      deliveries.forEach(function(d, i) { d.num = i + 1; });
      renderList();
      if (googleMap) refreshMapPins();
      closeSheet();
    })
    .catch(function(e) {
      loading(false);
      alert("削除エラー: " + (e && e.message ? e.message : String(e)));
    });
}

function closeSheet() {
  var sheet = document.getElementById("bottom-sheet");
  sheet.classList.remove("show", "expand");
  sheetExpanded = false;
  selectedIdx = -1;
  pinEditMode = false;
  if (googleMap) refreshMapPins();
}

// ══════════════════════════════════════
// Googleマップ起動
// ══════════════════════════════════════
function openGmap(address) {
  if (!address || address === "—") { alert("住所が登録されていません"); return; }
  var url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address);
  var a = document.createElement("a");
  a.href = url; a.target = "_blank"; a.rel = "noopener noreferrer";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ══════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function abbrev(s, n) { return (!s || s.length <= n) ? (s||"") : s.slice(0,n) + "…"; }
function formatTime(iso) {
  if (!iso) return "—";
  var d = new Date(iso); if (isNaN(d.getTime())) return "—";
  return ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
}
function formatDateTime(iso) {
  if (!iso) return "—";
  var d = new Date(iso); if (isNaN(d.getTime())) return "—";
  return (d.getMonth()+1) + "/" + d.getDate() + " " +
    ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
}

// Enterキーログイン
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") doLogin();
});
